apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bifrost-secrets
  namespace: apps
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: secretstore-aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: bifrost-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    # LM Studio (Mac Studio @ 192.168.2.4:1234) — keyless on LAN but token-authed.
    # Used by the lmstudio-local custom provider in apps/bifrost/helm-values.yaml.
    - secretKey: LMSTUDIO_API_KEY
      remoteRef:
        key: /k3s-geekzoo/bifrost/lmstudio-api-key
    # Claude Subscription — Mac Studio anthropic-protocol proxy @ 192.168.2.4:3456.
    # Used by the "Claude Subscription" custom provider (base_provider_type: anthropic).
    - secretKey: CLAUDE_SUBSCRIPTION_API_KEY
      remoteRef:
        key: /k3s-geekzoo/bifrost/claude-subscription-api-key
    # z.ai Coding Plan — https://api.z.ai/api/anthropic (anthropic protocol).
    # Used by the "z.ai Coding Plan" custom provider.
    - secretKey: ZAI_API_KEY
      remoteRef:
        key: /k3s-geekzoo/bifrost/zai-api-key
    # Note: "OpenAI Subscription" (Mac Studio @ 192.168.2.4:8000) is keyless —
    # its provider block in helm-values.yaml uses a literal "keyless" placeholder.
