apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bifrost-secrets
  namespace: apps
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: secretstore-aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: bifrost-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    # LM Studio (Mac Studio @ 192.168.2.4:1234) — keyless on LAN but token-authed.
    # Used by the lmstudio-local custom provider in apps/bifrost/configmap.yaml.
    - secretKey: LMSTUDIO_API_KEY
      remoteRef:
        key: /k3s-geekzoo/bifrost/lmstudio-api-key
