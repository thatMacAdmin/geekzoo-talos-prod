apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
  namespace: apps
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: secretstore-aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"thatMacAdmin","password":"{{ .token }}","auth":"{{ printf "thatMacAdmin:%s" .token | b64enc }}"}}}
  data:
    - secretKey: token
      remoteRef:
        key: /k3s-geekzoo/ghcr-pull-token
