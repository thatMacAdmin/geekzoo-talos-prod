apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: plane-redis-auth
  namespace: database
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: secretstore-aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: plane-redis-auth
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /k3s-geekzoo/plane-redis-auth
