apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-password
  namespace: database
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: secretstore-aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: redis-password
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /k3s-geekzoo/redis-password
