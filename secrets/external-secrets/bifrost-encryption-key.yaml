apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bifrost-encryption-key
  namespace: apps
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: secretstore-aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: bifrost-encryption-key
    creationPolicy: Owner
  data:
    # Bifrost derives an AES-256 key from this passphrase via Argon2id.
    # Irreversible once data is written under it — see apps/bifrost/helm-values.yaml.
    - secretKey: encryption-key
      remoteRef:
        key: /k3s-geekzoo/bifrost/encryption-key
