apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: inbox-zero-secrets
  namespace: apps
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: secretstore-aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: inbox-zero-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Prisma: pooled + direct URLs (single instance, both point at -rw)
        DATABASE_URL: "postgresql://inboxzero:{{ .pg_password }}@inbox-zero-pg-cluster-rw.database.svc.cluster.local:5432/inboxzero"
        DIRECT_URL: "postgresql://inboxzero:{{ .pg_password }}@inbox-zero-pg-cluster-rw.database.svc.cluster.local:5432/inboxzero"
        # BullMQ queue backend → shared cluster Redis
        REDIS_URL: "redis://:{{ .redis_password }}@redis-master.database.svc.cluster.local:6379"
        # App cache goes through the SRH Upstash-HTTP shim (see apps/inbox-zero/srh.yaml)
        SRH_CONNECTION_STRING: "redis://:{{ .redis_password }}@redis-master.database.svc.cluster.local:6379"
        UPSTASH_REDIS_TOKEN: "{{ .srh_token }}"
        SRH_TOKEN: "{{ .srh_token }}"
        GOOGLE_CLIENT_ID: "{{ .google_client_id }}"
        GOOGLE_CLIENT_SECRET: "{{ .google_client_secret }}"
        AUTH_SECRET: "{{ .auth_secret }}"
        INTERNAL_API_KEY: "{{ .internal_api_key }}"
        CRON_SECRET: "{{ .cron_secret }}"
        EMAIL_ENCRYPT_SECRET: "{{ .email_encrypt_secret }}"
        EMAIL_ENCRYPT_SALT: "{{ .email_encrypt_salt }}"
  data:
    - secretKey: pg_password
      remoteRef:
        key: /k3s-geekzoo/pg-app-user-inbox-zero
        property: password
    - secretKey: redis_password
      remoteRef:
        key: /k3s-geekzoo/redis-password
        property: password
    - secretKey: srh_token
      remoteRef:
        key: /k3s-geekzoo/inbox-zero/srh-token
    - secretKey: google_client_id
      remoteRef:
        key: /k3s-geekzoo/inbox-zero/google-client-id
    - secretKey: google_client_secret
      remoteRef:
        key: /k3s-geekzoo/inbox-zero/google-client-secret
    - secretKey: auth_secret
      remoteRef:
        key: /k3s-geekzoo/inbox-zero/auth-secret
    - secretKey: internal_api_key
      remoteRef:
        key: /k3s-geekzoo/inbox-zero/internal-api-key
    - secretKey: cron_secret
      remoteRef:
        key: /k3s-geekzoo/inbox-zero/cron-secret
    - secretKey: email_encrypt_secret
      remoteRef:
        key: /k3s-geekzoo/inbox-zero/email-encrypt-secret
    - secretKey: email_encrypt_salt
      remoteRef:
        key: /k3s-geekzoo/inbox-zero/email-encrypt-salt
