---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: crowdsec-syslog-agent-password
  namespace: apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: secretstore-aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: crowdsec-syslog-agent-password
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: /k3s-geekzoo/crowdsec/syslog-agent-password
