apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mariadb-galera-blocky-root
  namespace: database
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: secretstore-aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: mariadb-galera-blocky-root
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /k3s-geekzoo/mariadb-galera-blocky-root