apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-cloud-metrics-auth
  namespace: monitoring
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: secretstore-aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: grafana-cloud-metrics-auth
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        username: "{{"{{"}} .username {{"}}"}}"
        password: "{{"{{"}} .password {{"}}"}}"
  data:
    - secretKey: username
      remoteRef:
        key: /k3s-geekzoo/grafana-cloud-metrics-username
    - secretKey: password
      remoteRef:
        key: /k3s-geekzoo/grafana-cloud-metrics-password