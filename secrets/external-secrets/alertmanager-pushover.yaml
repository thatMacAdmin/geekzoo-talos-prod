apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-pushover
  namespace: monitoring
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: secretstore-aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: alertmanager-pushover
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        user_key: "{{ .user_key }}"
        api_token: "{{ .api_token }}"
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
          route:
            group_by:
              - alertname
              - cluster
              - namespace
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 12h
            receiver: pushover
            routes:
              - receiver: blackhole
                matchers:
                  - severity="info"
          receivers:
            - name: blackhole
            - name: pushover
              pushover_configs:
                - user_key: "{{ .user_key }}"
                  token: "{{ .api_token }}"
                  title: >-
                    Geekzoo {{ "{{" }} .Status {{ "}}" }}: {{ "{{" }} .CommonLabels.alertname {{ "}}" }}
                  message: >-
                    severity={{ "{{" }} .CommonLabels.severity {{ "}}" }}
                    namespace={{ "{{" }} .CommonLabels.namespace {{ "}}" }}
                    pod={{ "{{" }} .CommonLabels.pod {{ "}}" }}
                    container={{ "{{" }} .CommonLabels.container {{ "}}" }}
                    {{ "{{" }} range .Alerts {{ "}}" }}{{ "{{" }} if .Annotations.summary {{ "}}" }}summary={{ "{{" }} .Annotations.summary {{ "}}" }} {{ "{{" }} end {{ "}}" }}{{ "{{" }} if .Annotations.description {{ "}}" }}description={{ "{{" }} .Annotations.description {{ "}}" }}{{ "{{" }} end {{ "}}" }}{{ "{{" }} end {{ "}}" }}
                  url: https://grafana.macbytes.io/d/geekzoo-active-alerts/active-alerts?orgId=1&refresh=30s
                  url_title: Open active alerts in Grafana
                  priority: "1"
  data:
    - secretKey: user_key
      remoteRef:
        key: /k3s-geekzoo/alertmanager-pushover/user-key
    - secretKey: api_token
      remoteRef:
        key: /k3s-geekzoo/alertmanager-pushover/api-token
