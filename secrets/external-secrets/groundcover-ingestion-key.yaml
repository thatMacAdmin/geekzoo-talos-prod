apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: groundcover-ingestion-key
  namespace: monitoring
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: secretstore-aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: groundcover-ingestion-key
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /k3s-geekzoo/groundcover-ingestion-key
