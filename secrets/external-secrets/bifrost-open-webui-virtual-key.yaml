apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bifrost-open-webui-virtual-key
  namespace: apps
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: secretstore-aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: bifrost-open-webui-vk
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    # Bifrost Virtual Key scoped for Open WebUI. Created in the Bifrost dashboard
    # (bifrost.macbytes.io) and stored in SSM out-of-band. Open WebUI presents this
    # as `Authorization: Bearer <vk>` against Bifrost's /v1/* endpoints, satisfying
    # enforceAuthOnInference (apps/bifrost/helm-values.yaml).
    - secretKey: virtual-key
      remoteRef:
        key: /k3s-geekzoo/bifrost/open-webui-virtual-key
