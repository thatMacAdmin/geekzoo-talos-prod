apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: plane-pg-cluster-backup
  namespace: database
spec:
  cluster:
    name: plane-pg-cluster
  schedule: "0 0 0 * * *"
  backupOwnerReference: self
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
