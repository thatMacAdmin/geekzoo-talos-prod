apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-pg-cluster
  namespace: database
spec:
  instances: 3
  enableSuperuserAccess: true
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: wasabi-object-store
        serverName: authentik-pg-cluster-geekzoo-prod
  bootstrap:
    recovery:
      source: authentik-pg-cluster-restore
  externalClusters:
    - name: authentik-pg-cluster-restore
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: wasabi-object-store
          serverName: authentik-pg-cluster
  storage:
    storageClass: ceph-block
    size: 10Gi
