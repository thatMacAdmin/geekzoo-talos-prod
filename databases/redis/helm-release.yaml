apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: database
spec:
  interval: 30m
  releaseName: redis
  chart:
    spec:
      chart: redis
      version: "23.2.12"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: database
  values:
    auth:
      enabled: true
      existingSecret: redis-password
      existingSecretPasswordKey: password
      usePasswordFile: true
    monitoring:
      enabled: false
    master:
      count: 1
      resourcesPreset: "medium"
      persistence:
        enabled: false
    replica:
      replicaCount: 3
      resourcesPreset: "medium"
      persistence:
        enabled: true
        size: 10Gi
        storageClass: ceph-block
