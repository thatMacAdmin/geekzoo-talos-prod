apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: database
spec:
  interval: 30m
  releaseName: redis
  chart:
    spec:
      chart: redis
      version: "23.2.12"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: database
  values:
    commonLabels:
      app.kubernetes.io/part-of: database
    auth:
      enabled: true
      existingSecret: redis-password
      existingSecretPasswordKey: password
      usePasswordFile: true
    monitoring:
      enabled: false
    master:
      count: 1
      # Explicit resources override resourcesPreset. Observed ~50m/pod;
      # memory kept at the old preset's values.
      resources:
        requests:
          cpu: 125m
          memory: 1Gi
        limits:
          cpu: 750m
          memory: 1536Mi
      persistence:
        enabled: false
    replica:
      replicaCount: 3
      resources:
        requests:
          cpu: 125m
          memory: 1Gi
        limits:
          cpu: 750m
          memory: 1536Mi
      persistence:
        enabled: true
        size: 10Gi
        storageClass: ceph-block
