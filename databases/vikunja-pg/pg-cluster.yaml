apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: vikunja-pg-cluster
  namespace: database
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:17.6-system-trixie
  instances: 1
  # Baseline scheduling reservation (observed ~15-40m per instance)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  enableSuperuserAccess: true
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: wasabi-object-store
        serverName: vikunja-pg-cluster-geekzoo-prod
  bootstrap:
    initdb:
      database: vikunja
      owner: vikunja
      secret:
        name: pg-app-user-vikunja
  storage:
    storageClass: ceph-block
    size: 10Gi
