apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plane-redis
  namespace: database
spec:
  interval: 30m
  releaseName: plane-redis
  chart:
    spec:
      chart: redis
      version: "0.16.9"
      sourceRef:
        kind: HelmRepository
        name: ot-helm
        namespace: database
  values:
    redisStandalone:
      name: plane-redis
      tag: v7.0.15
      imagePullPolicy: IfNotPresent
      redisSecret:
        secretName: plane-redis-auth
        secretKey: password
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 256Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: ceph-block
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
