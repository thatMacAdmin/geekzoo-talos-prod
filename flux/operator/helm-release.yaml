apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 10m
  releaseName: flux-operator
  chart:
    spec:
      chart: flux-operator
      version: "0.53.0"
      sourceRef:
        kind: HelmRepository
        name: flux-operator
        namespace: flux-system
  values:
    installCRDs: true
