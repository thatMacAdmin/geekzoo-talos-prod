apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: system
  labels:
    app: cloudflared
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/instance: cloudflared
    app.kubernetes.io/component: tunnel
    app.kubernetes.io/part-of: system
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      app: cloudflared
  # Single replica so the egress-bandwidth cap below is a true ceiling.
  # Cloudflare load-balances tunnel connections across replicas, so a per-pod
  # cap with 2 replicas would allow up to 2x the limit.
  replicas: 1
  template:
    metadata:
      labels:
        app: cloudflared
        app.kubernetes.io/name: cloudflared
        app.kubernetes.io/instance: cloudflared
        app.kubernetes.io/component: tunnel
        app.kubernetes.io/part-of: system
        app.kubernetes.io/managed-by: kustomize
      annotations:
        # Cap remote (tunnel) egress to 25 Mbit/s to protect the ~40 Mbit/s uplink.
        # Only inbound/remote traffic traverses cloudflared; LAN clients hit Traefik
        # directly (192.168.3.0) and stay unthrottled for full-bitrate local direct play.
        # Enforced by Cilium Bandwidth Manager (enable-bandwidth-manager: true).
        kubernetes.io/egress-bandwidth: "25M"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.2.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config/config.yaml
            - run
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            failureThreshold: 3
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config
              readOnly: true
            - name: creds
              mountPath: /etc/cloudflared/creds
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "250m"
      volumes:
        - name: creds
          secret:
            secretName: tunnel-credentials
        - name: config
          configMap:
            name: cloudflared
            items:
              - key: config.yaml
                path: config.yaml
