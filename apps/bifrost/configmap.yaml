apiVersion: v1
kind: ConfigMap
metadata:
  name: bifrost-config
  namespace: apps
  labels:
    app: bifrost
data:
  # Bifrost gateway config. Source of truth lives here in git; the pod runs it
  # read-only (seeded into an emptyDir at /app/data on boot — see deployment).
  #
  # Two providers:
  #   lmstudio-local — Mac Studio LM Studio, keyless OpenAI-compatible custom
  #     provider. Clients use model "lmstudio-local/<model>". Bifrost appends
  #     the OpenAI default path /v1/chat/completions to base_url.
  #   zai — z.ai open-platform API (general pay-per-token endpoint, NOT the
  #     coding-plan endpoint, whose ToS is restricted to coding tools).
  #     GLM-4.7-Flash / GLM-4.5-Flash are $0/token. z.ai's chat path is
  #     /api/paas/v4/chat/completions, hence request_path_overrides.
  #     Key comes from the bifrost-secrets ESO secret via env.
  #
  # Bifrost has no static cross-provider fallback; callers wanting failover
  # pass a per-request "fallbacks": ["lmstudio-local/<model>"] array.
  config.json: |
    {
      "providers": {
        "lmstudio-local": {
          "keys": [
            {
              "name": "lmstudio-key",
              "value": "dummy",
              "models": ["*"],
              "weight": 1.0
            }
          ],
          "network_config": {
            "base_url": "http://192.168.2.4:1234",
            "default_request_timeout_in_seconds": 120
          },
          "custom_provider_config": {
            "base_provider_type": "openai",
            "allowed_requests": {
              "chat_completion": true,
              "chat_completion_stream": true
            }
          }
        },
        "zai": {
          "keys": [
            {
              "name": "zai-key",
              "value": "env.ZAI_API_KEY",
              "models": ["*"],
              "weight": 1.0
            }
          ],
          "network_config": {
            "base_url": "https://api.z.ai",
            "default_request_timeout_in_seconds": 120
          },
          "custom_provider_config": {
            "base_provider_type": "openai",
            "request_path_overrides": {
              "chat_completion": "/api/paas/v4/chat/completions",
              "chat_completion_stream": "/api/paas/v4/chat/completions"
            },
            "allowed_requests": {
              "chat_completion": true,
              "chat_completion_stream": true
            }
          }
        }
      }
    }
