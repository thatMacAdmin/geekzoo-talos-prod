apiVersion: v1
kind: ConfigMap
metadata:
  name: bifrost-config
  namespace: apps
  labels:
    app: bifrost
data:
  # Bifrost gateway config. Source of truth lives here in git; the pod runs it
  # read-only (seeded into an emptyDir at /app/data on boot — see deployment).
  #
  # Single provider:
  #   lmstudio-local — Mac Studio LM Studio (192.168.2.4:1234), OpenAI-compatible
  #     custom provider. Clients pass model "lmstudio-local/<model>"; Bifrost
  #     appends /v1/chat/completions to base_url. LM Studio has token auth
  #     enabled; the token is interpolated from env.LMSTUDIO_API_KEY (sourced
  #     from the bifrost-secrets ESO secret).
  #
  #   network_config.allow_private_network: true is REQUIRED — Bifrost v1.5.9+
  #   blocks RFC1918 destinations by default (SSRF protection). Without this
  #   flag, requests fail with "connection to private IP 192.168.2.4 is not
  #   allowed" even though the host is reachable. Loopback/link-local stay
  #   blocked regardless.
  #
  # The z.ai provider was removed — the z.ai coding plan we were using is
  # ToS-restricted to coding tools, and the pay-per-token endpoint offered no
  # upside over the local Mac Studio. To restore, re-add the provider block
  # and the ZAI_API_KEY ExternalSecret entry.
  #
  # Bifrost has no static cross-provider fallback; callers wanting failover
  # pass a per-request "fallbacks": ["<provider>/<model>"] array.
  config.json: |
    {
      "providers": {
        "lmstudio-local": {
          "keys": [
            {
              "name": "lmstudio-key",
              "value": "env.LMSTUDIO_API_KEY",
              "models": ["*"],
              "weight": 1.0
            }
          ],
          "network_config": {
            "base_url": "http://192.168.2.4:1234",
            "default_request_timeout_in_seconds": 120,
            "allow_private_network": true
          },
          "custom_provider_config": {
            "base_provider_type": "openai",
            "allowed_requests": {
              "chat_completion": true,
              "chat_completion_stream": true
            }
          }
        }
      }
    }
