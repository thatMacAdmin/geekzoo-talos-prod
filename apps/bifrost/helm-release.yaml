apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bifrost
  namespace: apps
spec:
  interval: 10m
  # releaseName: bifrost — Service is named "bifrost" (used by inbox-zero at
  # http://bifrost.apps.svc.cluster.local:8080/v1; previously bifrost-svc).
  releaseName: bifrost
  chart:
    spec:
      chart: bifrost
      # Chart appVersion is 1.5.x; we pin the image tag explicitly below to v1.6.2
      # (newer than the chart's appVersion — chart templates are compatible).
      version: "2.1.29"
      sourceRef:
        kind: HelmRepository
        name: bifrost
        namespace: apps
  valuesFrom:
    - kind: ConfigMap
      name: bifrost-helm-values
      valuesKey: values.yaml
