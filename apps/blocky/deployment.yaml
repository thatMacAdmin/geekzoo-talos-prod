apiVersion: apps/v1
kind: Deployment
metadata:
  name: blocky
  namespace: apps
  labels:
    app: blocky
spec:
  selector:
    matchLabels:
      app: blocky
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: blocky
    spec:
      initContainers:
        - name: ensure-querylog-schema
          image: postgres:17
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: blocky-ui-database-url
                  key: DATABASE_URL
          command:
            - /bin/sh
            - -ec
            - |
              psql "$DATABASE_URL" <<'SQL'
              CREATE TABLE IF NOT EXISTS public.log_entries (
                request_ts     TIMESTAMPTZ NOT NULL,
                client_ip      TEXT,
                client_name    TEXT,
                duration_ms    BIGINT,
                reason         TEXT,
                response_type  TEXT,
                question_type  TEXT,
                question_name  TEXT,
                effective_tldp TEXT,
                answer         TEXT,
                response_code  TEXT,
                hostname       TEXT
              );
              CREATE INDEX IF NOT EXISTS idx_log_entries_request_ts
                ON public.log_entries USING btree (request_ts);
              CREATE INDEX IF NOT EXISTS idx_log_entries_client_name
                ON public.log_entries USING btree (client_name);
              CREATE INDEX IF NOT EXISTS idx_log_entries_response_type
                ON public.log_entries USING btree (response_type);
              SQL
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: blocky
          image: spx01/blocky:v0.29.0 # {"$imagepolicy": "flux-system:blocky-image-policy"}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_BIND_SERVICE
              drop:
                - ALL
          args:
            - --config
            - /app/config.yml
          ports:
            - containerPort: 53
              protocol: UDP
            - containerPort: 53
              protocol: TCP
            - containerPort: 4000
              protocol: TCP
          envFrom:
            - secretRef:
                name: blocky-ui-database-url
          volumeMounts:
            - name: blocky-config
              mountPath: /app/config.yml
              subPath: config.yml
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: blocky-config
          secret:
            secretName: blocky-config
            optional: false
