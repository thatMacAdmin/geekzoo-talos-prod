apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minecraft
  namespace: apps
spec:
  interval: 30m
  releaseName: geekzoo
  chart:
    spec:
      chart: minecraft
      version: "5.0.0"
      sourceRef:
        kind: HelmRepository
        name: minecraft-server-charts
        namespace: apps
  valuesFrom:
    - kind: ConfigMap
      name: minecraft-helm-values
      valuesKey: values.yaml
