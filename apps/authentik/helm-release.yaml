apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: identity
spec:
  interval: 30m
  releaseName: authentik
  chart:
    spec:
      chart: authentik
      version: "2026.2.2"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: identity
  values:
    global:
      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-secret-key
              key: secret_key
        - name: AUTHENTIK_POSTGRESQL__HOST
          valueFrom:
            secretKeyRef:
              name: authentik-database-config
              key: hostname
        - name: AUTHENTIK_POSTGRESQL__NAME
          valueFrom:
            secretKeyRef:
              name: authentik-database-config
              key: database_name
        - name: AUTHENTIK_POSTGRESQL__USER
          valueFrom:
            secretKeyRef:
              name: authentik-database-config
              key: username
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-database-config
              key: password
        - name: AUTHENTIK_STORAGE__BACKEND
          value: s3
        - name: AUTHENTIK_STORAGE__S3__ENDPOINT
          value: https://s3.macbytes.io
        - name: AUTHENTIK_STORAGE__S3__BUCKET_NAME
          value: authentik-storage
        - name: AUTHENTIK_STORAGE__S3__REGION
          value: us-east-1
        - name: AUTHENTIK_STORAGE__S3__ADDRESSING_STYLE
          value: path
        - name: AUTHENTIK_STORAGE__S3__ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-s3-storage
              key: access_key
        - name: AUTHENTIK_STORAGE__S3__SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-s3-storage
              key: secret_key
    server:
      enabled: true
      replicas: 1
      podAnnotations:
        macbytes.io/authentik-blueprint-revision: "2026-05-03-friendly-brand-v2"
      service:
        type: ClusterIP
    worker:
      enabled: true
      replicas: 1
      podAnnotations:
        macbytes.io/authentik-blueprint-revision: "2026-05-03-friendly-brand-v2"
    blueprints:
      configMaps:
        - authentik-macbytes-login-flow-blueprint
    postgresql:
      enabled: false
    redis:
      enabled: false
