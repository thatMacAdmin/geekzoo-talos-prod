apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: groundcover
  namespace: flux-system
spec:
  dependsOn:
    - name: secrets
    - name: infra-controllers
  interval: 10m
  retryInterval: 2m
  timeout: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/groundcover
  prune: true
  wait: true
