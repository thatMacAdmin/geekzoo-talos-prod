apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability
  namespace: flux-system
spec:
  dependsOn:
    - name: storage
    - name: infra-configs
    - name: secrets
  interval: 10m
  retryInterval: 2m
  timeout: 25m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./observability
  prune: true
  wait: true
