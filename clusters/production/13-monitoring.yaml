apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring
  namespace: flux-system
spec:
  dependsOn:
    - name: secrets
    - name: infra-configs
    - name: monitoring-controllers
  interval: 10m
  retryInterval: 2m
  timeout: 20m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./monitoring/configs
  prune: true
  wait: true
