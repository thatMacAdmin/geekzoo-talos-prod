kind: Cluster
name: geekzoo-prod
kubernetes:
  version: v1.35.2
talos:
  version: v1.13.6
features:
  backupConfiguration:
    interval: 12h0m0s
patches:
  - idOverride: 200-geekzoo-prod
    inline: |-
      machine:
        features:
          kubePrism:
            enabled: true
            port: 7445
        kernel:
          modules:
            - name: br_netfilter
            - name: xt_socket
        kubelet:
          extraMounts:
            - destination: /sys/fs/bpf
              type: bind
              source: /sys/fs/bpf
              options:
                - bind
                - rshared
                - rw

      cluster:
        allowSchedulingOnControlPlanes: true
        network:
          cni:
            name: none
          podSubnets:
            - 10.244.0.0/16
            - fd10:244::/56
          serviceSubnets:
            - 10.96.0.0/12
            - fd10:96::/112
        proxy:
          disabled: true
  - idOverride: 430-time-servers
    inline: |
      # All nodes track the in-cluster chrony VIP (single shared reference —
      # collapses relative skew, which is what Ceph mon quorum cares about).
      # time.cloudflare.com stays as fallback for cold boot / chrony outage,
      # when the VIP is unreachable.
      machine:
          time:
              servers:
                  - 192.168.3.13
                  - time.cloudflare.com
---
kind: ControlPlane
machines:
  - 502c56f6-51d7-e811-b6dc-f4939fee3ceb
  - 96766fba-1132-e811-af82-7020840f9bfc
  - d2c036d2-dcd3-e811-ba86-f4939fedefb3
