# A flux managed helm release for the rook operator
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-operator
  namespace: rook-ceph
spec:
  interval: 30m
  releaseName: rook-operator
  chart:
    spec:
      chart: rook-ceph
      version: "1.19.2"
      sourceRef:
        kind: HelmRepository
        name: rook-operator
        namespace: rook-ceph
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace