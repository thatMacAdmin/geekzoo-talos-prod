clusterId: geekzoo-geekzoo-prod
env: production

global:
  groundcoverPredefinedTokenSecret:
    secretName: api-key
    secretKey: API_KEY
  labelEnrichment:
    staticLabels: {}
    identifiersMapping:
      team:
        - groundcover.com/team
        - groundcover-team
        - tags.datadoghq.com/team
      service:
        - groundcover.com/service
        - groundcover-service
        - tags.datadoghq.com/service
    pods:
      labels:
        collectAll: false
        metrics:
          - groundcover.com/service
          - groundcover.com/team
          - app.kubernetes.io/name
          - app.kubernetes.io/instance
          - app.kubernetes.io/version
          - app.kubernetes.io/component
          - app.kubernetes.io/part-of
          - app.kubernetes.io/managed-by
        logs:
          - groundcover.com/service
          - groundcover.com/team
          - app.kubernetes.io/name
          - app.kubernetes.io/instance
          - app.kubernetes.io/component
        traces:
          - groundcover.com/service
          - groundcover.com/team
          - app.kubernetes.io/name
          - app.kubernetes.io/instance
          - app.kubernetes.io/component
        events:
          - groundcover.com/service
          - groundcover.com/team
          - app.kubernetes.io/name
          - app.kubernetes.io/instance
          - app.kubernetes.io/component
      annotations:
        collectAll: false
        metrics: []
        logs: []
        traces: []
        events: []
    nodes:
      labels: []

agent:
  flb:
    resources:
      limits:
        cpu: 500m
        memory: 64Mi
      requests:
        cpu: 100m
        memory: 64Mi
  sensor:
    resources:
      limits:
        memory: 1Gi
      requests:
        memory: 1Gi
  tolerations: []

backend:
  postgresql:
    primary:
      resources:
        limits:
          memory: 256Mi
        requests:
          cpu: 20m
          memory: 80Mi

clickhouse:
  resources:
    limits:
      memory: 6000Mi
    requests:
      cpu: 600m
      memory: 4096Mi

custom-metrics:
  extraArgs:
    remoteWrite.maxDailySeries: "10000000"
    remoteWrite.maxHourlySeries: "1000000"
  resources:
    limits:
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

groundcover:
  extraObjects:
    namespace-podsecurity-serviceaccount:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: groundcover-namespace-podsecurity
        namespace: '{{ .Release.Namespace }}'
        annotations:
          helm.sh/hook: pre-install,pre-upgrade
          helm.sh/hook-weight: "-20"
          helm.sh/hook-delete-policy: before-hook-creation
    namespace-podsecurity-role:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: '{{ .Release.Name }}-namespace-podsecurity'
        annotations:
          helm.sh/hook: pre-install,pre-upgrade
          helm.sh/hook-weight: "-20"
          helm.sh/hook-delete-policy: before-hook-creation
      rules:
        - apiGroups:
            - ""
          resources:
            - namespaces
          verbs:
            - get
            - patch
    namespace-podsecurity-binding:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: '{{ .Release.Name }}-namespace-podsecurity'
        annotations:
          helm.sh/hook: pre-install,pre-upgrade
          helm.sh/hook-weight: "-20"
          helm.sh/hook-delete-policy: before-hook-creation
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: '{{ .Release.Name }}-namespace-podsecurity'
      subjects:
        - kind: ServiceAccount
          name: groundcover-namespace-podsecurity
          namespace: '{{ .Release.Namespace }}'
    namespace-podsecurity-job:
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: groundcover-namespace-podsecurity
        namespace: '{{ .Release.Namespace }}'
        annotations:
          helm.sh/hook: pre-install,pre-upgrade
          helm.sh/hook-weight: "-10"
          helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
      spec:
        backoffLimit: 3
        template:
          spec:
            restartPolicy: OnFailure
            serviceAccountName: groundcover-namespace-podsecurity
            containers:
              - name: patch-namespace
                image: '{{ .Values.global.origin.registry }}/tools:20260601'
                imagePullPolicy: IfNotPresent
                command:
                  - /bin/sh
                  - -c
                args:
                  - |
                    set -eu

                    token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
                    ca="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                    namespace="{{ .Release.Namespace }}"
                    api="https://kubernetes.default.svc/api/v1/namespaces/${namespace}"

                    patch='{"metadata":{"labels":{"pod-security.kubernetes.io/enforce":"privileged","pod-security.kubernetes.io/audit":"privileged","pod-security.kubernetes.io/warn":"privileged","pod-security.kubernetes.io/enforce-version":"latest"}}}'

                    curl --fail --show-error --silent \
                      --cacert "${ca}" \
                      -H "Authorization: Bearer ${token}" \
                      -H "Content-Type: application/merge-patch+json" \
                      -X PATCH \
                      --data "${patch}" \
                      "${api}"

k8sWatcher:
  resources:
    limits:
      cpu: 500m
      memory: 1024Mi
    requests:
      cpu: 50m
      memory: 300Mi

metrics-ingester:
  resources:
    limits:
      cpu: 750m
      memory: 512Mi
    requests:
      memory: 256Mi

monitors-manager:
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 40m
      memory: 160Mi

opentelemetry-collector:
  replicaCount: 2
  resources:
    limits:
      memory: 2048Mi
    requests:
      cpu: 500m
      memory: 1024Mi

portal:
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 100Mi

storeIssuesLogsOnly: false

victoria-metrics-agent:
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

victoria-metrics-single:
  server:
    resources:
      limits:
        memory: 5000Mi
      requests:
        cpu: 1000m
        memory: 5000Mi
