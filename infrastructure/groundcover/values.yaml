# Minimal Groundcover values.yaml for geekzoo-talos-prod cluster
# Addresses: PodSecurity permissions, IPv6 networking, Talos/Cilium compatibility

global:
  # Cluster identification
  groundcoverPartOf: groundcover
  env:
    clusterId: geekzoo-geekzoo-prod
    env_type: k8s

  # ClickHouse IPv6 fix - prefer IPv4 to avoid ZooKeeper connection issues
  # in IPv6-enabled clusters (Cilium dual-stack)
  clickhouse:
    extraOverrides: |
      <clickhouse>
        {{ include "clickhouse.opentelemetrySpanLogSetting" . }}
        <listen_host>0.0.0.0</listen_host>
        <prefer_ipv6>0</prefer_ipv6>
        <cpu_slot_preemption>true</cpu_slot_preemption>
        <logger>
          <formatting><type>json</type></formatting>
        </logger>
        <max_connections>10000</max_connections>
        <max_table_size_to_drop>0</max_table_size_to_drop>
        <max_partition_size_to_drop>0</max_partition_size_to_drop>
        <merge_tree>
          <materialize_ttl_recalculate_only>0</materialize_ttl_recalculate_only>
          <max_suspicious_broken_parts_bytes>5368709120</max_suspicious_broken_parts_bytes>
          <max_suspicious_broken_parts>1000</max_suspicious_broken_parts>
        </merge_tree>
        <profiles>
          <default>
            <materialize_ttl_after_modify>0</materialize_ttl_after_modify>
            <idle_connection_timeout>600</idle_connection_timeout>
            <distributed_connections_pool_size>10000</distributed_connections_pool_size>
            <max_distributed_connections>10000</max_distributed_connections>
            <allow_simdjson>true</allow_simdjson>
            <allow_experimental_analyzer>0</allow_experimental_analyzer>
            <date_time_input_format>best_effort</date_time_input_format>
            <async_insert>true</async_insert>
            <max_execution_time>60</max_execution_time>
            <wait_for_async_insert>true</wait_for_async_insert>
            <enable_json_type>1</enable_json_type>
            <enable_full_text_index>1</enable_full_text_index>
          </default>
        </profiles>
        <query_log>
          <ttl>event_date + INTERVAL 10 DAY</ttl>
        </query_log>
        <trace_log>
          <ttl>event_date + INTERVAL 3 DAY</ttl>
        </trace_log>
        <metric_log>
          <ttl>event_date + INTERVAL 3 DAY</ttl>
        </metric_log>
        <processors_profile_log>
          <ttl>event_date + INTERVAL 1 DAY</ttl>
        </processors_profile_log>
        <part_log>
          <ttl>event_date + INTERVAL 1 DAY</ttl>
        </part_log>
        <query_views_log>
          <ttl>event_date + INTERVAL 1 DAY</ttl>
        </query_views_log>
        <text_log>
          <ttl>event_date + INTERVAL 2 DAY</ttl>
        </text_log>
      </clickhouse>

# ClickHouse-specific settings
clickhouse:
  volumePermissions:
    enabled: true