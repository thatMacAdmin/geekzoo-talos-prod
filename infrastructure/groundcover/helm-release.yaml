apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: groundcover
  namespace: groundcover
spec:
  interval: 30m
  releaseName: groundcover
  chart:
    spec:
      chart: groundcover
      version: "1.11.968"
      sourceRef:
        kind: HelmRepository
        name: groundcover
        namespace: groundcover
  valuesFrom:
    - kind: ConfigMap
      name: groundcover-values
      valuesKey: values.yaml
