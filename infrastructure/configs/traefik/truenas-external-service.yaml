apiVersion: v1
kind: Service
metadata:
  name: truenas-lb-backend
  namespace: traefik
spec:
  ports:
    - name: https
      port: 443
      targetPort: 443
---
apiVersion: v1
kind: Endpoints
metadata:
  name: truenas-lb-backend
  namespace: traefik
subsets:
  - addresses:
      - ip: 192.168.2.10
    ports:
      - name: https
        port: 443
