apiVersion: coroot.com/v1
kind: Coroot
metadata:
  name: coroot
  namespace: coroot
spec:
  metricsRefreshInterval: 15s
  cacheTTL: 2d
  logsTTL: 2d
  tracesTTL: 2d
  profilesTTL: 2d
  disableBuiltinAlerts: false
  projects:
    - name: default
      apiKeys:
        - key: "00000000000000000000000000000000"
          description: Default project access
      notificationIntegrations:
        baseURL: https://coroot.macbytes.io
        webhook:
          url: http://vmalertmanager-alertmanager.monitoring.svc.cluster.local:9093/api/v2/alerts
          customHeaders:
            - key: Content-Type
              value: application/json
          alerts: true
          incidents: false
          deployments: false
          alertTemplate: |
            [
              {
                "labels": {
                  "alertname": "Coroot {{ if eq .Status `OK` }}resolved {{ end }}{{ .RuleName }}",
                  "severity": "{{ if eq .Status `OK` }}info{{ else }}{{ .Severity }}{{ end }}",
                  "source": "coroot",
                  "project": "{{ .ProjectName }}",
                  "namespace": "{{ .Application.Namespace }}",
                  "kind": "{{ .Application.Kind }}",
                  "app": "{{ .Application.Name }}"
                },
                "annotations": {
                  "summary": {{ json .Summary }},
                  "description": "Coroot {{ .RuleName }} for {{ .Application.Kind }}/{{ .Application.Name }} in namespace {{ .Application.Namespace }}.",
                  "url": {{ json .URL }}
                }
              }
            ]
      applicationCategories:
        - name: application
          notificationSettings:
            alerts:
              enabled: true
              webhook:
                enabled: true
        - name: control-plane
          notificationSettings:
            alerts:
              enabled: true
              webhook:
                enabled: true
        - name: monitoring
          notificationSettings:
            alerts:
              enabled: true
              webhook:
                enabled: true
      alertingRules:
        - id: storage-space
          enabled: true
        - id: memory-oom
          enabled: true
        - id: instance-availability
          enabled: true
        - id: instance-restarts
          enabled: true
        - id: kubernetes-events
          enabled: true
          source:
            type: kubernetes_events
            kubernetesEvents:
              minCount: 3
              maxAlertsPerApp: 10
              evaluateWithAi: false
  storage:
    size: 10Gi
    className: ceph-block
    reclaimPolicy: Delete
  service:
    type: ClusterIP
    port: 8080
    grpcPort: 4317
  nodeAgent:
    tolerations:
      - operator: Exists
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        cpu: 500m
        memory: 1Gi
  prometheus:
    retention: 2d
    storage:
      size: 10Gi
      className: ceph-block
      reclaimPolicy: Delete
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 2Gi
  clickhouse:
    storage:
      size: 10Gi
      className: ceph-block
      reclaimPolicy: Delete
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        memory: 3Gi
