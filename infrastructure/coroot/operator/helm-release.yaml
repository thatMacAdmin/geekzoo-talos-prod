apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coroot-operator
  namespace: coroot
spec:
  interval: 30m
  releaseName: coroot-operator
  chart:
    spec:
      chart: coroot-operator
      version: "0.9.6"
      sourceRef:
        kind: HelmRepository
        name: coroot
        namespace: coroot
  values:
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
