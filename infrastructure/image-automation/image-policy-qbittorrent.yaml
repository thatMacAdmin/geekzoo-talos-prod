apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: qbittorrent-image-policy
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: qbittorrent
  filterTags:
    pattern: '^version-(?P<version>[0-9]+\.[0-9]+\.[0-9]+)-r[0-9]+$'
    extract: '$version'
  policy:
    semver:
      range: ">=4.0.0"
