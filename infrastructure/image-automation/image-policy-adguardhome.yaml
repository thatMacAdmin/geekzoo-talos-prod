apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: adguardhome-image-policy
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: adguardhome
  filterTags:
    pattern: '^v(?P<version>[0-9]+\.[0-9]+\.[0-9]+)$'
    extract: '$version'
  policy:
    semver:
      range: ">=0.107.74"
