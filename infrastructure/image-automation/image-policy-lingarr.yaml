apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: lingarr-image-policy
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: lingarr
  filterTags:
    pattern: '^(?P<version>[0-9]+\.[0-9]+\.[0-9]+)$'
    extract: '$version'
  policy:
    semver:
      range: ">=1.2.4 <2.0.0"
