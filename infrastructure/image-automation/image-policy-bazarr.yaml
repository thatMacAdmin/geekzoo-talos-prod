apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: bazarr-image-policy
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: bazarr
  filterTags:
    pattern: '^release-(?P<version>[0-9]+\.[0-9]+\.[0-9]+)$'
    extract: '$version'
  policy:
    semver:
      range: ">=1.5.6"
