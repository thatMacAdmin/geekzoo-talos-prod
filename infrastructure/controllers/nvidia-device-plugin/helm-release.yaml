apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-device-plugin
  namespace: kube-system
spec:
  interval: 30m
  releaseName: nvidia-device-plugin
  chart:
    spec:
      chart: nvidia-device-plugin
      version: "0.18.2"
      sourceRef:
        kind: HelmRepository
        name: nvidia-device-plugin
        namespace: kube-system
  values:
    runtimeClassName: nvidia
    mps:
      enabled: true
