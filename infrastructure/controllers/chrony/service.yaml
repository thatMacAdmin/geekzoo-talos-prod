apiVersion: v1
kind: Service
metadata:
  name: chrony
  namespace: kube-system
  labels:
    app: chrony
  annotations:
    # Pin a stable LAN VIP from the Cilium lan-pool (192.168.3.0/24).
    # .0 traefik, .1 minecraft, .10 adguard, .11 signoz syslog,
    # .12 alloy syslog are taken; .13 is free.
    io.cilium/lb-ipam-ips: "192.168.3.13"
spec:
  type: LoadBalancer
  ipFamilyPolicy: SingleStack
  ipFamilies: [IPv4]
  selector:
    app: chrony
  ports:
    - name: ntp
      protocol: UDP
      port: 123
      targetPort: ntp
