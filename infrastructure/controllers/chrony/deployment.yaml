apiVersion: apps/v1
kind: Deployment
metadata:
  name: chrony
  namespace: kube-system
  labels:
    app: chrony
spec:
  # Exactly one replica: multiple independent clocks answering one VIP would
  # feed clients inconsistent time. Recreate avoids two chronyds overlapping.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: chrony
  template:
    metadata:
      labels:
        app: chrony
    spec:
      # hostPath is root-owned on creation; chronyd runs as uid 100 (image
      # USER, no privdrop) and must write drift + measurement dumps there.
      initContainers:
        - name: fix-perms
          image: docker.io/dockurr/chrony:4.6.1
          command: ["sh", "-c", "chown -R 100:101 /var/lib/chrony"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: state
              mountPath: /var/lib/chrony
      containers:
        - name: chrony
          image: docker.io/dockurr/chrony:4.6.1
          # -x: serve time WITHOUT disciplining the host clock — Talos timed
          # owns the node clock; chrony tracks upstream offset in software and
          # serves corrected time. -d: foreground, logs to stderr.
          command: ["/usr/sbin/chronyd", "-d", "-x", "-f", "/etc/chrony/chrony.conf"]
          ports:
            - name: ntp
              containerPort: 123
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /etc/chrony/chrony.conf
              subPath: chrony.conf
              readOnly: true
            - name: run
              mountPath: /var/run/chrony
            - name: state
              mountPath: /var/lib/chrony
          livenessProbe:
            exec:
              command: ["chronyc", "-n", "tracking"]
            initialDelaySeconds: 30
            periodSeconds: 60
          # Gate the VIP: not Ready until synced to a real upstream with <50ms
          # correction remaining. A cold-starting chrony serving a swinging
          # estimate is worse than no VIP — endpoints withdraw, Talos nodes
          # fall back to time.cloudflare.com until we've converged. Tradeoff:
          # during a WAN outage longer than ~1min the VIP withdraws too and
          # nodes coast on their own clocks (~few ms/hr relative drift — fine).
          readinessProbe:
            exec:
              command: ["chronyc", "waitsync", "1", "0.05", "0.0", "1"]
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 4
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: chrony-config
        - name: run
          emptyDir: {}
        # Per-node persistence is semantically correct: the drift value is the
        # frequency error of THIS node's oscillator. After a reschedule to
        # another node the file there is that node's own last estimate.
        - name: state
          hostPath:
            path: /var/lib/chrony
            type: DirectoryOrCreate
