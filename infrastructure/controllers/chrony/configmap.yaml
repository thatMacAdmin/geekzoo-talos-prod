apiVersion: v1
kind: ConfigMap
metadata:
  name: chrony-config
  namespace: kube-system
  labels:
    app: chrony
data:
  chrony.conf: |
    # Upstream sources — chrony continuously selects the best. All plain UTC
    # (no leap-smeared sources like time.google.com — never mix smeared and
    # unsmeared). Cloudflare anycast is the closest/most stable from this WAN;
    # NIST + us pool give diversity for outages and falseticker detection.
    server time.cloudflare.com iburst
    server time.nist.gov iburst
    server 0.us.pool.ntp.org iburst
    server 1.us.pool.ntp.org iburst

    # Persisted on hostPath: the frequency estimate belongs to the node's
    # oscillator, so per-node persistence is exactly right — restarts on the
    # same node skip the 20-30 min cold-start convergence (during which served
    # time swings enough to spike mon skew 50-105ms). dump/restore additionally
    # saves per-source measurement history on graceful shutdown.
    driftfile /var/lib/chrony/drift
    dumpdir /var/lib/chrony

    # Serve the LAN and the pod network
    allow 192.168.0.0/16
    allow 10.244.0.0/16

    # Brief upstream flaps: keep answering from our own clock at stratum 10 so
    # clients see no gap; sustained outages fail the readiness gate and
    # withdraw the VIP — nodes then coast on their own clocks (few ms/hr
    # relative drift). No `distance` option: the default (1s) means orphan
    # activates only on real outage. 0.1 was hair-triggered — WAN sources sit
    # at 50-90ms root distance, so transient dispersion flipped us to orphan
    # (refid 7F7F0101) and the readiness probe could never pass.
    local stratum 10 orphan
