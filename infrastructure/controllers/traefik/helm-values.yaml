# Traefik v3.5.0 Configuration
# Pin the exact version for stability
image:
  tag: "v3.5.0"

# Service configuration - Cilium LB
service:
  type: LoadBalancer
  spec:
    ipFamilyPolicy: PreferDualStack
    ipFamilies:
      - IPv4
      - IPv6
  annotations:
    io.cilium/lb-ipam-ips: "192.168.3.0,2603:6010:ce00:1197::3:1"

# Ports configuration - v3.x format with expose object
ports:
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 80
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443
    http3:
      enabled: true
  traefik:
    port: 8080
    expose:
      default: true
  metrics:
    port: 9100
    expose:
      default: false

ingressClass:
  enabled: true
  isDefaultClass: true

providers:
  file:
    enabled: true
    watch: true
  kubernetesIngress:
    enabled: true
    publishedService:
      enabled: false
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
api:
  dashboard: true
  insecure: false

ingressRoute:
  dashboard:
    enabled: true

metrics:
  prometheus:
    # ServiceMonitor is required: kube-prometheus-stack's operator only scrapes
    # via ServiceMonitor CRDs and ignores prometheus.io/* annotations. The
    # release label must match the operator's serviceMonitorSelector.
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
      interval: 30s
    service:
      enabled: true
      type: ClusterIP
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
      labels:
        monitoring: "true"
    entryPoint: metrics

# Logs configuration
logs:
  general:
    level: INFO

  access:
    enabled: true
    format: json
    fields:
      general:
        defaultmode: keep
      headers:
        defaultmode: keep

# Deploy as DaemonSet to run on all nodes for externalTrafficPolicy: Local
deployment:
  kind: DaemonSet
  podLabels:
    app.kubernetes.io/part-of: system

# Accept forwarded headers from cluster/LAN ranges (working config)
additionalArguments:
  - "--entryPoints.websecure.forwardedHeaders.trustedIPs=10.42.0.0/16,10.43.0.0/16,192.168.0.0/16"
  - "--entryPoints.web.forwardedHeaders.trustedIPs=10.42.0.0/16,10.43.0.0/16,192.168.0.0/16"
  # Global HTTP->HTTPS redirect: every plain-HTTP request on :80 is redirected
  # to HTTPS, so apps only need a websecure IngressRoute (no per-app redirect
  # middleware). Safe with DNS-01 issuance (no ACME HTTP-01 challenge on :80).
  # Target the exposed :443, NOT to=websecure (which would emit the entrypoint's
  # internal container port :8443, unreachable on the LoadBalancer).
  - "--entryPoints.web.http.redirections.entryPoint.to=:443"
  - "--entryPoints.web.http.redirections.entryPoint.scheme=https"
  - "--entryPoints.web.http.redirections.entryPoint.permanent=true"
  - "--accessLog.filePath=/dev/stdout"
  - "--accessLog.fields.names.ClientHost=keep"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    # TLS-handshake micro-bursts hit 23% CFS throttle at 500m
    cpu: 1000m
    memory: 512Mi
