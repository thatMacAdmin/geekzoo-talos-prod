apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-operator
  namespace: openobserve
spec:
  interval: 30m
  releaseName: opentelemetry-operator
  chart:
    spec:
      chart: opentelemetry-operator
      version: "0.114.1"
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: openobserve
  values:
    admissionWebhooks:
      certManager:
        enabled: true
    manager:
      serviceMonitor:
        enabled: false
    crds:
      create: true
