apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-operator
  namespace: gpu-operator
spec:
  interval: 30m
  releaseName: gpu-operator
  chart:
    spec:
      chart: gpu-operator
      version: "v26.3.1"
      sourceRef:
        kind: HelmRepository
        name: nvidia
        namespace: gpu-operator
  values:
    driver:
      enabled: false
    toolkit:
      enabled: false
    hostPaths:
      driverInstallDir: /usr/local
