apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis-operator
  namespace: redis-operator
spec:
  interval: 30m
  releaseName: redis-operator
  chart:
    spec:
      chart: redis-operator
      version: "0.24.0"
      sourceRef:
        kind: HelmRepository
        name: ot-helm
        namespace: redis-operator
  values:
    redisOperator:
      imagePullPolicy: IfNotPresent
      metrics:
        enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 500Mi
