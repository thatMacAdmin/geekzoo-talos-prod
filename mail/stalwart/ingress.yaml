apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: stalwart-dav-ingressroute
  namespace: mail
spec:
  entryPoints:
    - websecure
  routes:
    # dav.macbytes.io serves CalDAV/CardDAV/WebDAV + JMAP + discovery ONLY.
    # PATH ALLOWLIST is the admin lockdown: Stalwart's :8080 serves the webadmin SPA as a
    # catch-all fallback on every unmatched path, so we match ONLY these prefixes. Anything
    # else (/, /account, /manage, /login, /api, SPA assets) hits NO route -> Traefik 404,
    # keeping the webadmin reachable only via Access-gated stalwart.macbytes.io.
    - match: Host(`dav.macbytes.io`) && (PathPrefix(`/dav`) || PathPrefix(`/jmap`) || PathPrefix(`/.well-known`) || PathPrefix(`/mail`) || PathPrefix(`/autodiscover`))
      kind: Rule
      services:
        - name: stalwart-svc
          port: 8080
  tls:
    secretName: stalwart-tls-certificate
