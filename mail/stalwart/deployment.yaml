apiVersion: apps/v1
kind: Deployment
metadata:
  name: stalwart
  namespace: mail
  labels:
    app: stalwart
    app.kubernetes.io/name: stalwart
    app.kubernetes.io/instance: stalwart
    app.kubernetes.io/component: mail
    app.kubernetes.io/part-of: mail
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      app: stalwart
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: stalwart
        app.kubernetes.io/name: stalwart
        app.kubernetes.io/instance: stalwart
        app.kubernetes.io/component: mail
        app.kubernetes.io/part-of: mail
        app.kubernetes.io/managed-by: kustomize
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000        # image user (uid=gid=2000)
        runAsGroup: 2000
        fsGroup: 2000          # so the ceph-block PVC is writable for RocksDB
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: bootstrap
          configMap:
            name: stalwart-bootstrap
        - name: data
          persistentVolumeClaim:
            claimName: stalwart-data-pvc
        - name: tls
          secret:
            secretName: stalwart-tls-certificate
        - name: tmp
          emptyDir: {}
      containers:
        - name: stalwart
          image: stalwartlabs/stalwart:v0.16.10
          imagePullPolicy: IfNotPresent
          securityContext:
            # The stalwartlabs/stalwart binary is setcap'd cap_net_bind_service=+ep (effective
            # bit set), so the kernel refuses to exec it unless that cap is in the bounding set
            # AND privilege escalation is allowed. We bind only unprivileged ports, but must
            # still satisfy the binary's file cap to exec. Net result: runs as uid 2000 with
            # exactly one capability (NET_BIND_SERVICE), everything else dropped.
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          ports:
            - { name: smtp-mx, containerPort: 2525 }
            - { name: submission, containerPort: 5587 }
            - { name: submissions, containerPort: 5465 }
            - { name: imaps, containerPort: 9993 }
            - { name: http, containerPort: 8080 }
          env:
            # --- runtime (always present): SES relay auth, resolved by the server ---
            - name: SES_SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mail-secrets
                  key: SES_SMTP_USERNAME
            - name: SES_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mail-secrets
                  key: SES_SMTP_PASSWORD
            # Provisioning recovery env removed — admin is now the datastore account
            # edward@macbytes.io (Administrator role). For break-glass / re-provisioning,
            # temporarily re-add: STALWART_RECOVERY_MODE="1" + STALWART_RECOVERY_ADMIN
            # (valueFrom secret mail-secrets key STALWART_RECOVERY_ADMIN).
          volumeMounts:
            - name: bootstrap
              mountPath: /etc/stalwart/config.json
              subPath: config.json
              readOnly: true
            - name: data
              mountPath: /var/lib/stalwart
            - name: tls
              mountPath: /etc/stalwart/tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /healthz/live
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
