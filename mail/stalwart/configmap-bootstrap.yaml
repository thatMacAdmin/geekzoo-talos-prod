apiVersion: v1
kind: ConfigMap
metadata:
  name: stalwart-bootstrap
  namespace: mail
data:
  # Minimal v0.16 Bootstrap object. Mounted read-only at /etc/stalwart/config.json.
  # Only SEEDS the datastore on first boot; the authoritative config is the NDJSON
  # apply plan pushed via stalwart-cli (see configmap-plan.yaml / apply-job.yaml).
  config.json: |
    {
      "serverHostname": "mail.macbytes.io",
      "defaultDomain": "macbytes.io",
      "requestTlsCertificate": false,
      "generateDkimKeys": false,
      "dataStore": {
        "@type": "RocksDb",
        "path": "/var/lib/stalwart"
      },
      "tracer": {
        "@type": "Stdout",
        "ansi": false
      }
    }
