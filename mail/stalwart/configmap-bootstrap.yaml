apiVersion: v1
kind: ConfigMap
metadata:
  name: stalwart-bootstrap
  namespace: mail
data:
  # In v0.16 the --config file is ONLY the data-store descriptor (top-level @type).
  # serverHostname/domain/listeners/relay/etc. all live in the datastore and are set
  # via the NDJSON apply plan (configmap-plan.yaml) through stalwart-cli.
  config.json: |
    {
      "@type": "RocksDb",
      "path": "/var/lib/stalwart"
    }
