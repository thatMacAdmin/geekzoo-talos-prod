apiVersion: v1
kind: ConfigMap
metadata:
  name: stalwart-plan
  namespace: mail
# Authoritative Stalwart config, applied to the datastore via `stalwart-cli apply`.
# NDJSON = one JSON op per line. Shapes VERIFIED LIVE against v0.16.10 (describe/snapshot):
#   - NetworkListener.bind is a SET serialized as an object: {"[::]:2525": true}
#   - Expression.match is an OBJECT keyed by "0","1",... (NOT an array); empty match = {}
#   - is_local_domain(rcpt_domain) takes ONE arg
#   - Certificate has NO `name` field -> use `create`. The `#id` cross-ref did NOT resolve
#     for SystemSettings.defaultCertificateId, so it uses LITERAL server-assigned ids from
#     THIS datastore (Domain=b, Certificate=ixupxm7sabaa) — env-specific; on a fresh rebuild,
#     set SystemSettings AFTER Domain+Certificate are created (read their ids via `query`).
#   - authUsername is a PLAIN STRING in Stalwart v0.16 (verified in source: used verbatim, NO env
#     or macro expansion — only authSecret supports {"@type":"EnvironmentVariable"}). To keep relay
#     LOGINS out of git, both route usernames are committed as ${VAR} placeholders and substituted
#     from SSM at apply time (Flux does NOT postBuild-substitute the `mail` Kustomization, and this
#     ConfigMap is never mounted, so the tokens only become real values in the apply step below):
#       export SES_SMTP_USERNAME=$(aws ssm get-parameter --name /k3s-geekzoo/mail/ses-smtp-username --with-decryption --query Parameter.Value --output text --region us-east-2 --profile admin)
#       export BREVO_SMTP_LOGIN=$(aws ssm get-parameter --name /k3s-geekzoo/mail/brevo-smtp-login --with-decryption --query Parameter.Value --output text --region us-east-2 --profile admin)
#       envsubst '$SES_SMTP_USERNAME $BREVO_SMTP_LOGIN' < stalwart-plan.ndjson | stalwart-cli apply ...
#     The PASSWORD is an env ref resolved by the SERVER (SES_SMTP_PASSWORD / BREVO_SMTP_PASSWORD in
#     the Deployment env), never stored here.
#   - ACTIVE outbound route = 'brevo' (smtp-relay.brevo.com:587). The 'ses' route is kept for a
#     one-line flip-back: change MtaOutboundStrategy route.else. Both stay authorized in SPF/DKIM.
#   - MtaStageAuth: inbound MX must NOT require auth. Stalwart's default require expr is
#     `local_port != 25`, but our MX listener binds 2525 (frp maps public :25 -> 2525, since the
#     pod can't bind privileged 25), so the default demanded auth on inbound -> "503 must
#     authenticate" -> ALL external mail rejected. Fixed to `local_port != 2525` (here + saslMechanisms).
#     Submission stays auth-required (5587/5465 are != 2525). Re-derive if listener ports change.
#   - AllowedIp 10.244.0.0/16: the in-cluster pod network is allowlisted so Stalwart's auto-ban
#     (fail2ban) never bans Traefik/frpc. Without it (incident 2026-06-28), frpc forwarding 4 ports
#     from one source IP trips "Excessive port scanning" -> the proxy IPs get BlockedIp'd ->
#     Traefik->:8080 dropped (502 on webadmin/dav/webmail) AND inbound mail/IMAP rejected. The bans
#     persist in the datastore (survive restart); only an AllowedIp (or manual BlockedIp delete)
#     clears them. PROXY-protocol (so Stalwart sees real client IPs) is the longer-term fix; until
#     then fail2ban can't see real clients anyway, so allowlisting internal infra is correct.
data:
  stalwart-plan.ndjson: |
    {"@type":"upsert","object":"Domain","matchOn":["name"],"value":{"d1":{"name":"macbytes.io"}}}
    {"@type":"create","object":"Certificate","value":{"mail-cert":{"certificate":{"@type":"File","filePath":"/etc/stalwart/tls/tls.crt"},"privateKey":{"@type":"File","filePath":"/etc/stalwart/tls/tls.key"}}}}
    {"@type":"update","object":"SystemSettings","value":{"defaultDomainId":"b","defaultCertificateId":"ixupxm7sabaa","defaultHostname":"mail.macbytes.io"}}
    {"@type":"upsert","object":"NetworkListener","matchOn":["name"],"value":{"mx":{"name":"mx","protocol":"smtp","bind":{"[::]:2525":true},"useTls":true,"tlsImplicit":false}}}
    {"@type":"upsert","object":"NetworkListener","matchOn":["name"],"value":{"submission":{"name":"submission","protocol":"smtp","bind":{"[::]:5587":true},"useTls":true,"tlsImplicit":false}}}
    {"@type":"upsert","object":"NetworkListener","matchOn":["name"],"value":{"submissions":{"name":"submissions","protocol":"smtp","bind":{"[::]:5465":true},"useTls":true,"tlsImplicit":true}}}
    {"@type":"upsert","object":"NetworkListener","matchOn":["name"],"value":{"imaps":{"name":"imaps","protocol":"imap","bind":{"[::]:9993":true},"useTls":true,"tlsImplicit":true}}}
    {"@type":"upsert","object":"NetworkListener","matchOn":["name"],"value":{"http":{"name":"http","protocol":"http","bind":{"[::]:8080":true},"useTls":false}}}
    {"@type":"upsert","object":"MtaRoute","matchOn":["name"],"value":{"ses":{"@type":"Relay","name":"ses","address":"email-smtp.us-east-2.amazonaws.com","port":587,"protocol":"smtp","implicitTls":false,"allowInvalidCerts":false,"authUsername":"${SES_SMTP_USERNAME}","authSecret":{"@type":"EnvironmentVariable","variableName":"SES_SMTP_PASSWORD"}}}}
    {"@type":"upsert","object":"MtaRoute","matchOn":["name"],"value":{"brevo":{"@type":"Relay","name":"brevo","address":"smtp-relay.brevo.com","port":587,"protocol":"smtp","implicitTls":false,"allowInvalidCerts":false,"authUsername":"${BREVO_SMTP_LOGIN}","authSecret":{"@type":"EnvironmentVariable","variableName":"BREVO_SMTP_PASSWORD"}}}}
    {"@type":"upsert","object":"MtaTlsStrategy","matchOn":["name"],"value":{"relay-tls":{"name":"relay-tls","dane":"disable","mtaSts":"disable","startTls":"require","allowInvalidCerts":false}}}
    {"@type":"update","object":"MtaOutboundStrategy","value":{"route":{"else":"'brevo'","match":{"0":{"if":"is_local_domain(rcpt_domain)","then":"'local'"}}},"tls":{"else":"'relay-tls'","match":{"0":{"if":"is_local_domain(rcpt_domain)","then":"'default'"}}}}}
    {"@type":"update","object":"SenderAuth","value":{"dkimSignDomain":{"else":"false","match":{}}}}
    {"@type":"update","object":"MtaStageAuth","value":{"require":{"else":"local_port != 2525","match":{}},"mustMatchSender":{"else":"true","match":{}},"waitOnFail":{"else":"5s","match":{}},"saslMechanisms":{"else":"false","match":{"0":{"then":"[plain, login, oauthbearer, xoauth2]","if":"local_port != 2525 && is_tls"},"1":{"then":"[oauthbearer, xoauth2]","if":"local_port != 2525"}}},"maxFailures":{"else":"3","match":{}}}}
    {"@type":"create","object":"Tracer","value":{"stdout-console":{"@type":"Stdout","enable":true,"level":"info","ansi":false,"buffered":false,"lossy":false,"multiline":false,"events":{},"eventsPolicy":"exclude"}}}
    {"@type":"upsert","object":"AllowedIp","matchOn":["address"],"value":{"allow-podnet":{"address":"10.244.0.0/16","reason":"In-cluster pod network (Traefik/frpc) - never auto-ban"}}}
