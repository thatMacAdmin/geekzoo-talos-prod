apiVersion: apps/v1
kind: Deployment
metadata:
  name: frpc
  namespace: mail
  labels:
    app: frpc
    app.kubernetes.io/name: frpc
    app.kubernetes.io/instance: frpc
    app.kubernetes.io/component: tunnel
    app.kubernetes.io/part-of: mail
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      app: frpc
  replicas: 1
  # Recreate (NOT RollingUpdate): for a 1-replica tunnel, the default RollingUpdate
  # (maxSurge 25% -> 1) starts a NEW frpc before the old one dies, so two clients
  # briefly hold the same proxy names on frps -> "proxy already exists" / stale
  # session -> mail breaks until a manual clean-slate. Recreate fully terminates the
  # old pod (closing its frps control connection, which releases the proxies) before
  # starting the new one, so every restart reconnects cleanly. See mail-build-decisions.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: frpc
        app.kubernetes.io/name: frpc
        app.kubernetes.io/instance: frpc
        app.kubernetes.io/component: tunnel
        app.kubernetes.io/part-of: mail
        app.kubernetes.io/managed-by: kustomize
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: frpc-config
        - name: tmp
          emptyDir: {}
      containers:
        - name: frpc
          image: snowdreamtech/frpc:0.69.1
          imagePullPolicy: IfNotPresent
          # Bypass the image's su-exec ENTRYPOINT (which needs SETUID/SETGID + root to
          # drop privileges) and run the binary directly as our non-root uid 65534.
          command: ["/usr/bin/frpc"]
          args: ["-c", "/etc/frp/frpc.toml"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: FRP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mail-secrets
                  key: FRP_TOKEN
          volumeMounts:
            - name: config
              mountPath: /etc/frp/frpc.toml
              subPath: frpc.toml
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "200m"
