apiVersion: v1
kind: Service
metadata:
  name: syslog-gateway
  namespace: observability
  labels:
    app: syslog-gateway
  annotations:
    # Pin a stable LAN VIP from the Cilium lan-pool (192.168.3.0/24).
    # .0 traefik, .1 minecraft, .10 adguard are taken; .11 is free.
    io.cilium/lb-ipam-ips: "192.168.3.11"
spec:
  type: LoadBalancer
  ipFamilyPolicy: SingleStack
  ipFamilies: [IPv4]
  selector:
    app: syslog-gateway
  ports:
    - name: syslog-udp
      protocol: UDP
      port: 514
      targetPort: 1514
    - name: syslog-tcp
      protocol: TCP
      port: 514
      targetPort: 1514
