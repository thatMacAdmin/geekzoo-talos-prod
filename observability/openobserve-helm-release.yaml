apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openobserve
  namespace: openobserve
spec:
  interval: 30m
  releaseName: openobserve
  chart:
    spec:
      chart: openobserve-standalone
      version: "0.80.3"
      sourceRef:
        kind: HelmRepository
        name: openobserve
        namespace: openobserve
  values:
    auth:
      existingRootUserSecret:
        name: openobserve-root-user
        emailKey: ZO_ROOT_USER_EMAIL
        passwordKey: ZO_ROOT_USER_PASSWORD
    config:
      ZO_CLUSTER_NAME: geekzoo-prod
      ZO_LOCAL_MODE: "true"
      ZO_LOCAL_MODE_STORAGE: s3
      ZO_S3_PROVIDER: minio
      ZO_S3_SERVER_URL: http://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc:80
      ZO_S3_REGION_NAME: us-east-1
      ZO_S3_FEATURE_FORCE_HOSTED_STYLE: "false"
      ZO_WEB_URL: https://openobserve.macbytes.io
    enterprise:
      enabled: false
    extraEnv:
      - name: ZO_S3_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: openobserve-bucket
            key: AWS_ACCESS_KEY_ID
      - name: ZO_S3_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: openobserve-bucket
            key: AWS_SECRET_ACCESS_KEY
      - name: ZO_S3_BUCKET_NAME
        valueFrom:
          configMapKeyRef:
            name: openobserve-bucket
            key: BUCKET_NAME
    persistence:
      enabled: true
      size: 20Gi
      storageClass: ceph-block
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        memory: 4Gi
