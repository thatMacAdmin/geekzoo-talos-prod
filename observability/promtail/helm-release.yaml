apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
  namespace: observability
spec:
  interval: 30m
  releaseName: promtail
  chart:
    spec:
      chart: promtail
      sourceRef:
        kind: HelmRepository
        name: grafana-loki
        namespace: observability
  valuesFrom:
    - kind: ConfigMap
      name: promtail-values
      valuesKey: values.yaml
