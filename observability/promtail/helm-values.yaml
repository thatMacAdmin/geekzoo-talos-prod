# Promtail values for geekzoo-prod

daemonSet: true

config:
  clients:
    - url: http://loki.observability.svc:3100/loki/api/v1/push

  snippets:
    pipelineStages:
      - cri: {}
      # --- Tier 1: JSON apps ---
      - match:
          selector: '{app="cloudflared"}'
          stages:
            - json:
                expressions:
                  level: level
                  event: event
            - labels:
                level:
      - match:
          selector: '{app="bifrost"}'
          stages:
            - json:
                expressions:
                  level: level
                  msg: msg
            - labels:
                level:
      # --- Tier 1: Arr stack (mono/.NET) ---
      - match:
          selector: '{app=~"sonarr|radarr|bazarr|prowlarr"}'
          stages:
            - regex:
                expression: '\[(?P<level>Info|Warn|Error|Fatal|Debug)\]'
            - labels:
                level:
      # --- Tier 1: nginx (website) ---
      - match:
          selector: '{app="website"}'
          stages:
            - regex:
                expression: '^(?P<remote_addr>\S+) \S+ \S+ \[(?P<time>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+) [^"]+" (?P<status>\d{3}) '
            - labels:
                status:
                method:
      # --- Tier 2: Vaultwarden (extended logging) ---
      - match:
          selector: '{app="vaultwarden"}'
          stages:
            - regex:
                expression: '\[(?P<timestamp>\d{4}-\d{2}-\d{2}[\d\s:.Z]+) (?P<level>ERROR|WARN|INFO|DEBUG|TRACE)'
            - labels:
                level:
      # --- Tier 2: Gluetun (VPN sidecar in qbittorrent) ---
      - match:
          selector: '{container="gluetun"}'
          stages:
            - regex:
                expression: '^\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2} (?P<level>INFO|WARN|ERROR|DEBUG|FATAL) '
            - labels:
                level:

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
