apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy-events
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: alloy
      # Semver range: minors/patches auto-upgrade, majors require a manual bump
      version: "1.x"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: observability
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: alloy-events-values
