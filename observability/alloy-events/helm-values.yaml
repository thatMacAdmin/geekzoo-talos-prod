# Alloy (cluster-singleton) values for geekzoo-prod.
# Collects Kubernetes events -> Loki. Runs as a StatefulSet with 1 replica:
# STS updates are delete-then-create, so upgrades never run two event
# tailers concurrently (a Deployment RollingUpdate would surge a second
# pod and double-ingest events).
# Restart/reschedule worst case: re-delivers <=1h of events (k8s event TTL).

controller:
  type: statefulset
  replicas: 1

alloy:
  extraPorts:
    - name: syslog-udp
      port: 5514
      targetPort: 5514
      protocol: UDP
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  configMap:
    content: |
      logging {
        level  = "warn"
        format = "logfmt"
      }

      loki.source.kubernetes_events "cluster" {
        job_name   = "kubernetes-events"
        log_format = "logfmt"
        forward_to = [loki.process.events.receiver]
      }

      loki.process "events" {
        forward_to = [loki.write.loki.receiver]

        // type (Normal/Warning) and reason are bounded sets -> structured
        // metadata for cheap filtering; object name/kind stay query-time.
        stage.logfmt {
          mapping = { evt_type = "type", evt_reason = "reason" }
        }
        stage.structured_metadata {
          values = { type = "evt_type", reason = "evt_reason" }
        }
      }

      // ---- network-device syslog (MikroTik switch, UniFi UDM SE) ----
      // Devices send RFC3164/BSD syslog over UDP to the LB VIP
      // 192.168.3.12:514 (service maps to 5514 — non-root can't bind <1024).
      loki.source.syslog "network_devices" {
        listener {
          address       = "0.0.0.0:5514"
          protocol      = "udp"
          syslog_format = "rfc3164"
          // RFC3164 timestamps lack year/zone; receive time is more reliable
          use_incoming_timestamp = false
          labels        = { job = "syslog" }
        }
        relabel_rules = loki.relabel.syslog.rules
        forward_to    = [loki.write.loki.receiver]
      }

      loki.relabel "syslog" {
        forward_to = [] // rules-only component

        rule {
          source_labels = ["__syslog_message_hostname"]
          target_label  = "host"
        }
        rule {
          source_labels = ["__syslog_message_severity"]
          target_label  = "level"
        }
        rule {
          source_labels = ["__syslog_message_facility"]
          target_label  = "facility"
        }
      }

      loki.write "loki" {
        endpoint {
          url = "http://loki.observability.svc:3100/loki/api/v1/push"
        }
      }

serviceMonitor:
  enabled: true
  additionalLabels:
    release: kube-prometheus-stack
