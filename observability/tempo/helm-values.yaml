# Tempo values for geekzoo-prod — single-binary mode (small cluster)

replicas: 1

tempo:
  retention: 24h
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal
  # Metrics generator — chart schema is remoteWriteUrl (flat), not a nested
  # config block; previous nesting was silently ignored and the chart default
  # URL (prometheus.monitoring) was rendered instead
  metricsGenerator:
    enabled: true
    remoteWriteUrl: "http://kube-prometheus-stack-prometheus.observability.svc:9090/api/v1/write"
  # Generator does nothing unless processors are enabled via overrides
  overrides:
    defaults:
      metrics_generator:
        processors:
          - service-graphs
          - span-metrics

persistence:
  enabled: true
  size: 10Gi
  storageClass: ceph-block

serviceMonitor:
  enabled: true
  additionalLabels:
    release: kube-prometheus-stack

gateway:
  enabled: false

test:
  enabled: false
