# Tempo values for geekzoo-prod — single-binary mode (small cluster)

replicas: 1

tempo:
  retention: 24h
  # Steady state ~1Gi working set, compaction spikes to ~2.4Gi (7d max);
  # CPU p99 65m. 256Mi request was dishonest scheduling; 8Gi/4-core limits
  # were pure headroom.
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal
  # Metrics generator — chart schema is remoteWriteUrl (flat), not a nested
  # config block; previous nesting was silently ignored and the chart default
  # URL (prometheus.monitoring) was rendered instead
  metricsGenerator:
    enabled: true
    remoteWriteUrl: "http://kube-prometheus-stack-prometheus.observability.svc:9090/api/v1/write"
    # local-blocks processor config — required for TraceQL metrics queries
    # (Grafana Traces Drilldown); flush to storage so metrics survive restarts
    processor:
      local_blocks:
        flush_to_storage: true
        filter_server_spans: false
  # Generator does nothing unless processors are enabled via overrides
  overrides:
    defaults:
      metrics_generator:
        processors:
          - service-graphs
          - span-metrics
          - local-blocks

persistence:
  enabled: true
  size: 10Gi
  storageClass: ceph-block

serviceMonitor:
  enabled: true
  additionalLabels:
    release: kube-prometheus-stack

gateway:
  enabled: false

test:
  enabled: false
