apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-infra
  namespace: observability
spec:
  dependsOn:
    - name: signoz
      namespace: observability
  interval: 30m
  timeout: 15m
  releaseName: k8s-infra
  chart:
    spec:
      chart: k8s-infra
      version: "0.16.0"
      sourceRef:
        kind: HelmRepository
        name: signoz
        namespace: observability
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: k8s-infra-values
      valuesKey: values.yaml
