apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: beyla
  namespace: observability
spec:
  interval: 30m
  releaseName: beyla
  chart:
    spec:
      chart: beyla
      # Pinned: the helm-controller's client rate limiter exhausts the 5m upgrade
      # timeout when auto-bumping (rate: Wait would exceed context deadline),
      # stalling the HelmRelease after retries. 1.16.8 is the current published
      # latest and what's deployed; pinning makes reconcile a no-op. Re-enable
      # auto-upgrade by returning to "1.x" once the controller rate-limit issue
      # is resolved or the upgrade window is widened.
      version: "1.16.8"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: observability
  install:
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  valuesFrom:
    - kind: ConfigMap
      name: beyla-values
      valuesKey: values.yaml
