# Beyla values for geekzoo-prod — eBPF auto-instrumentation
# Dual mode: network flow metrics (Prometheus) + application traces (Tempo)

# Application preset sets hostPID=true (required for trace instrumentation)
# Network mode enabled via config.data.network below (also triggers hostNetwork)
preset: application

# Enable OTLP trace export to Tempo via env vars
# Endpoint must NOT include /v1/traces — OTLP SDK appends it automatically
env:
  BEYLA_OTLP_TRACES: "1"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://tempo.observability.svc:4318"
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"

# Service exposing metrics endpoint for ServiceMonitor scraping
service:
  enabled: true
  port: 9090
  targetPort: 9090

# ServiceMonitor — auto-discovered by kube-prometheus-stack Prometheus
serviceMonitor:
  enabled: true
  additionalLabels:
    release: kube-prometheus-stack

# Resources — eBPF overhead is modest
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 768Mi

# Mount bpffs — required for eBPF trace probes on Talos
volumes:
  - name: bpffs
    hostPath:
      path: /sys/fs/bpf
      type: DirectoryOrCreate
volumeMounts:
  - name: bpffs
    mountPath: /sys/fs/bpf
    mountPropagation: HostToContainer

# Beyla agent configuration
config:
  data:
    # Enrich metrics and traces with Kubernetes metadata
    attributes:
      kubernetes:
        enable: true

    # Network mode — enables flow metrics alongside app traces
    network:
      enable: true

    # Application discovery — instrument all HTTP/gRPC services
    discovery:
      instrument:
        - name: web-services
          open_ports: 80,8080,443,3000,5000,8000,8443,9000

    # Exclude infra/system noise from network metrics
    filter:
      network:
        k8s_dst_owner_name:
          not_match: '{kube*,*jaeger-agent*,*prometheus*,*promtail*,*loki*,*node-exporter*,*cilium*,*beyla*,*tempo*}'
        k8s_src_owner_name:
          not_match: '{kube*,*jaeger-agent*,*prometheus*,*promtail*,*loki*,*node-exporter*,*cilium*,*beyla*,*tempo*}'

    # Prometheus exporter — network + application RED metrics
    prometheus_export:
      port: 9090
      path: /metrics
