# Loki values for geekzoo-prod — single-binary mode (small cluster)

deploymentMode: SingleBinary

loki:
  commonConfig:
    replication_factor: 1
  auth_enabled: false
  storage:
    type: filesystem
  # Retention: without this the 50Gi PVC fills indefinitely. Compactor needs
  # an explicit delete_request_store when retention is enabled.
  compactor:
    retention_enabled: true
    delete_request_store: filesystem
  limits_config:
    retention_period: 720h # 30d
    # Default-true on v13+TSDB; pinned so Alloy structured-metadata ingest
    # never silently breaks if a future chart default flips.
    allow_structured_metadata: true
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ceph-block
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Memcached caches: chart defaults reserve 500m CPU + ~9.6Gi memory EACH —
# absurd for this cluster's log volume. allocatedMemory drives the memory
# request/limit. Observed fill over months: chunks peaked at 62Mi, results
# at 9Mi — even these shrunken sizes are generous.
chunksCache:
  allocatedMemory: 256
  resources:
    requests:
      cpu: 25m
      memory: 384Mi
    limits:
      memory: 384Mi
resultsCache:
  allocatedMemory: 128
  resources:
    requests:
      cpu: 25m
      memory: 192Mi
    limits:
      memory: 192Mi

gateway:
  enabled: false

test:
  enabled: false

lokiCanary:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
