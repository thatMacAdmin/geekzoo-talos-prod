apiVersion: v1
kind: ConfigMap
metadata:
  name: signoz-otel-collector
  namespace: observability
data:
  otel-collector-config.yaml: |-
    connectors:
      signozmeter:
        metrics_flush_interval: 1h
        dimensions:
          - name: service.name
          - name: deployment.environment
          - name: host.name
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
            max_recv_msg_size_mib: 16
          http:
            endpoint: 0.0.0.0:4318
      jaeger:
        protocols:
          grpc:
            endpoint: 0.0.0.0:14250
          thrift_http:
            endpoint: 0.0.0.0:14268
      httplogreceiver/heroku:
        endpoint: 0.0.0.0:8081
        source: heroku
      httplogreceiver/json:
        endpoint: 0.0.0.0:8082
        source: json
      # Scrape Hubble (Cilium) network metrics from each cilium agent on :9965.
      # Pod-role discovery only; the collector SA already has pods list/watch.
      prometheus/hubble:
        config:
          scrape_configs:
            - job_name: hubble
              scrape_interval: 60s
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names: [kube-system]
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_k8s_app]
                  action: keep
                  regex: cilium
                - source_labels: [__meta_kubernetes_pod_ip]
                  action: replace
                  target_label: __address__
                  replacement: ${1}:9965
                - source_labels: [__meta_kubernetes_pod_node_name]
                  action: replace
                  target_label: node
                - source_labels: [__meta_kubernetes_pod_name]
                  action: replace
                  target_label: pod
    processors:
      batch:
        send_batch_size: 50000
        timeout: 1s
      transform/logs:
        error_mode: ignore
        log_statements:
          # Universal: parse JSON bodies, extract severity + human-readable message
          - context: log
            statements:
              - merge_maps(attributes, ParseJSON(body), "upsert") where IsMatch(body, "^\\s*\\{")
              - set(severity_text, ConvertCase(attributes["level"], "upper")) where attributes["level"] != nil and severity_text == ""
              - set(body, attributes["msg"]) where attributes["msg"] != nil and attributes["msg"] != "" and IsMatch(body, "^\\s*\\{")
              - delete_key(attributes, "level")
              - delete_key(attributes, "ts")
              - delete_key(attributes, "msg")

          # Traefik: promote HTTP fields to semantic conventions, clean up header noise
          - context: log
            conditions:
              - resource.attributes["k8s.namespace.name"] == "traefik"
            statements:
              - set(attributes["http.request.method"], attributes["RequestMethod"]) where attributes["RequestMethod"] != nil
              - set(attributes["url.path"], attributes["RequestPath"]) where attributes["RequestPath"] != nil
              - set(attributes["server.address"], attributes["RequestHost"]) where attributes["RequestHost"] != nil
              - set(attributes["http.response.status_code"], Int(attributes["DownstreamStatus"])) where attributes["DownstreamStatus"] != nil
              - set(attributes["http.server.request.duration_ns"], Int(attributes["Duration"])) where attributes["Duration"] != nil
              - set(attributes["traefik.router"], attributes["RouterName"]) where attributes["RouterName"] != nil
              - set(attributes["traefik.entrypoint"], attributes["entryPointName"]) where attributes["entryPointName"] != nil
              - set(attributes["tls.protocol.version"], attributes["TLSVersion"]) where attributes["TLSVersion"] != nil
              - set(attributes["user_agent.original"], attributes["request_User-Agent"]) where attributes["request_User-Agent"] != nil
              - set(body, Concat([attributes["http.request.method"], attributes["url.path"]], " ")) where attributes["http.request.method"] != nil
              - delete_matching_keys(attributes, "^(Client|Downstream|Duration|GzipRatio|Origin|Overhead|Request|RetryAttempts|RouterName|Service|SpanId|StartLocal|StartUTC|TLSCipher|TLSVersion|TraceId|entryPointName|time)")
              - delete_matching_keys(attributes, "^(request_|downstream_|origin_)")

          # Authentik: promote HTTP fields, drop internal/noisy fields
          - context: log
            conditions:
              - resource.attributes["k8s.deployment.name"] == "authentik-server"
            statements:
              - set(attributes["url.path"], attributes["event"]) where attributes["event"] != nil
              - set(attributes["http.request.method"], attributes["method"]) where attributes["method"] != nil
              - set(attributes["http.response.status_code"], Int(attributes["status"])) where attributes["status"] != nil
              - set(attributes["user_agent.original"], attributes["user_agent"]) where attributes["user_agent"] != nil
              - set(attributes["http.request.id"], attributes["request_id"]) where attributes["request_id"] != nil
              - set(attributes["http.server.request.duration_ms"], attributes["runtime"]) where attributes["runtime"] != nil
              - set(attributes["enduser.id"], attributes["user"]) where attributes["user"] != nil and attributes["user"] != ""
              - set(body, Concat([attributes["http.request.method"], attributes["url.path"]], " ")) where attributes["http.request.method"] != nil
              - delete_key(attributes, "event")
              - delete_key(attributes, "method")
              - delete_key(attributes, "status")
              - delete_key(attributes, "user_agent")
              - delete_key(attributes, "request_id")
              - delete_key(attributes, "runtime")
              - delete_key(attributes, "user")
              - delete_key(attributes, "pid")
              - delete_key(attributes, "auth_via")
              - delete_key(attributes, "domain_url")
              - delete_key(attributes, "host")
              - delete_key(attributes, "schema_name")
              - delete_key(attributes, "scheme")
              - delete_key(attributes, "remote")
              - delete_key(attributes, "timestamp")

          # CloudNativePG postgres container: extract nested record, surface postgres severity
          - context: log
            conditions:
              - resource.attributes["k8s.namespace.name"] == "database"
              - resource.attributes["k8s.container.name"] == "postgres"
            statements:
              - set(attributes["db.postgresql.severity"], attributes["record"]["error_severity"]) where attributes["record"] != nil
              - set(attributes["db.statement.summary"], attributes["record"]["message"]) where attributes["record"] != nil
              - set(attributes["db.postgresql.backend_type"], attributes["record"]["backend_type"]) where attributes["record"] != nil
              - set(attributes["db.postgresql.sql_state"], attributes["record"]["sql_state_code"]) where attributes["record"] != nil
              - set(severity_text, attributes["record"]["error_severity"]) where attributes["record"] != nil and attributes["record"]["error_severity"] != nil
              - set(body, attributes["record"]["message"]) where attributes["record"] != nil and attributes["record"]["message"] != nil
              - delete_key(attributes, "record")
              - delete_key(attributes, "logging_pod")

          # Sonarr: parse plain-text "[Level] Logger: Message" format
          - context: log
            conditions:
              - resource.attributes["k8s.deployment.name"] == "sonarr"
              - IsMatch(body, "^\\[\\w+\\]")
            statements:
              - merge_maps(attributes, ExtractPatterns(body, "^\\[(?P<log_level>\\w+)\\]\\s+(?P<log_logger>[^:]+):\\s+(?P<log_message>.*)"), "upsert") where IsMatch(body, "^\\[\\w+\\]")
              - set(severity_text, ConvertCase(attributes["log_level"], "upper")) where attributes["log_level"] != nil and severity_text == ""
              - set(attributes["logger"], attributes["log_logger"]) where attributes["log_logger"] != nil
              - set(body, attributes["log_message"]) where attributes["log_message"] != nil
              - delete_key(attributes, "log_level")
              - delete_key(attributes, "log_logger")
              - delete_key(attributes, "log_message")

          # MikroTik CRS518 syslog (arrives via syslog-gateway with resource service.name=mikrotik-crs518).
          # The syslog receiver puts the RFC3164 MSG text in attributes["message"] and keeps the raw
          # "<PRI>timestamp host ..." line in body, plus a PRI-derived severity. Here we promote the
          # MSG to body, split out the RouterOS topic, and surface interface-flap signals for alerting.
          # Safe alongside the JSON branch above: RouterOS plain-text never matches IsMatch(body, "^\\s*\\{").
          - context: log
            conditions:
              - resource.attributes["service.name"] == "mikrotik-crs518"
            statements:
              - set(resource.attributes["host.name"], attributes["hostname"]) where attributes["hostname"] != nil
              # Use the parsed MSG text as the body baseline (receiver leaves raw <PRI>... in body)
              - set(body, attributes["message"]) where attributes["message"] != nil
              # Split the leading comma-joined topic group (e.g. "interface,info") from the human message
              - merge_maps(attributes, ExtractPatterns(body, "^(?P<routeros_topics>[a-z]+(?:,[a-z]+)*)\\s+(?P<routeros_msg>.*)$"), "upsert") where IsMatch(body, "^[a-z]+(,[a-z]+)*\\s")
              - set(attributes["routeros.topic"], attributes["routeros_topics"]) where attributes["routeros_topics"] != nil
              - set(body, attributes["routeros_msg"]) where attributes["routeros_msg"] != nil and attributes["routeros_msg"] != ""
              # Explicit interface-flap signals for cheap per-interface alerting (interface token precedes "link up/down")
              - set(attributes["net.link.state"], "down") where IsMatch(body, "(?i)link down")
              - set(attributes["net.link.state"], "up") where IsMatch(body, "(?i)link up")
              - merge_maps(attributes, ExtractPatterns(body, "^(?P<net_interface_name>\\S+)\\s+link\\s+(?:up|down)"), "upsert") where IsMatch(body, "(?i)^\\S+ link (up|down)")
              - set(attributes["net.interface.name"], attributes["net_interface_name"]) where attributes["net_interface_name"] != nil
              # tidy temp + now-redundant keys
              - delete_key(attributes, "message")
              - delete_key(attributes, "routeros_topics")
              - delete_key(attributes, "routeros_msg")
              - delete_key(attributes, "net_interface_name")
      batch/meter:
        send_batch_max_size: 25000
        send_batch_size: 20000
        timeout: 1s
      signozspanmetrics/delta:
        metrics_exporter: signozclickhousemetrics
        latency_histogram_buckets: [100us, 1ms, 2ms, 6ms, 10ms, 50ms, 100ms, 250ms, 500ms, 1000ms, 1400ms, 2000ms, 5s, 10s, 20s, 40s, 60s]
        dimensions_cache_size: 100000
        dimensions:
          - name: service.namespace
            default: default
          - name: deployment.environment
            default: default
          - name: signoz.collector.id
        aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      zpages:
        endpoint: localhost:55679
      pprof:
        endpoint: localhost:1777
    exporters:
      clickhousetraces:
        datasource: tcp://${env:CLICKHOUSE_USER}:${env:CLICKHOUSE_PASSWORD}@${env:CLICKHOUSE_HOST}:${env:CLICKHOUSE_PORT}/${env:CLICKHOUSE_TRACE_DATABASE}
        low_cardinal_exception_grouping: ${env:LOW_CARDINAL_EXCEPTION_GROUPING}
        use_new_schema: true
      signozclickhousemetrics:
        dsn: tcp://${env:CLICKHOUSE_USER}:${env:CLICKHOUSE_PASSWORD}@${env:CLICKHOUSE_HOST}:${env:CLICKHOUSE_PORT}/${env:CLICKHOUSE_DATABASE}
        timeout: 45s
      clickhouselogsexporter:
        dsn: tcp://${env:CLICKHOUSE_USER}:${env:CLICKHOUSE_PASSWORD}@${env:CLICKHOUSE_HOST}:${env:CLICKHOUSE_PORT}/${env:CLICKHOUSE_LOG_DATABASE}
        timeout: 10s
        use_new_schema: true
      metadataexporter:
        enabled: true
        dsn: tcp://${env:CLICKHOUSE_USER}:${env:CLICKHOUSE_PASSWORD}@${env:CLICKHOUSE_HOST}:${env:CLICKHOUSE_PORT}/signoz_metadata
        timeout: 10s
        tenant_id: ${env:TENANT_ID}
        cache:
          provider: in_memory
      signozclickhousemeter:
        dsn: tcp://${env:CLICKHOUSE_USER}:${env:CLICKHOUSE_PASSWORD}@${env:CLICKHOUSE_HOST}:${env:CLICKHOUSE_PORT}/${env:CLICKHOUSE_METER_DATABASE}
        timeout: 45s
        sending_queue:
          enabled: false
    service:
      telemetry:
        logs:
          encoding: json
      extensions: [health_check, zpages, pprof]
      pipelines:
        traces:
          receivers: [otlp, jaeger]
          processors: [signozspanmetrics/delta, batch]
          exporters: [clickhousetraces, metadataexporter, signozmeter]
        metrics:
          receivers: [otlp, prometheus/hubble]
          processors: [batch]
          exporters: [metadataexporter, signozclickhousemetrics, signozmeter]
        logs:
          receivers: [otlp, httplogreceiver/heroku, httplogreceiver/json]
          processors: [transform/logs, batch]
          exporters: [clickhouselogsexporter, metadataexporter, signozmeter]
        metrics/meter:
          receivers: [signozmeter]
          processors: [batch/meter]
          exporters: [signozclickhousemeter]
