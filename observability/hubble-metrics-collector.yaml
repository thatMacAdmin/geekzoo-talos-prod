apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: hubble-metrics
  namespace: openobserve
spec:
  mode: deployment
  replicas: 1
  serviceAccount: openobserve-collector
  image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.138.0
  env:
    - name: OPENOBSERVE_AUTH_HEADER
      valueFrom:
        secretKeyRef:
          name: openobserve-root-user
          key: OPENOBSERVE_AUTH_HEADER
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 256Mi
  config:
    receivers:
      prometheus:
        config:
          scrape_configs:
            - job_name: hubble
              scrape_interval: 30s
              scrape_timeout: 10s
              static_configs:
                - targets:
                    - hubble-metrics.kube-system.svc.cluster.local:9965
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 192
        spike_limit_mib: 64
      attributes:
        actions:
          - key: k8s_cluster
            action: insert
            value: geekzoo-prod
      batch:
        send_batch_size: 1000
        send_batch_max_size: 2000
        timeout: 5s
    exporters:
      otlphttp/openobserve:
        endpoint: http://openobserve-openobserve-standalone.openobserve.svc.cluster.local:5080/api/default/
        headers:
          Authorization: ${env:OPENOBSERVE_AUTH_HEADER}
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    service:
      extensions:
        - health_check
      pipelines:
        metrics:
          receivers:
            - prometheus
          processors:
            - memory_limiter
            - attributes
            - batch
          exporters:
            - otlphttp/openobserve
