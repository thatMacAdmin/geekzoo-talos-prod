# kube-prometheus-stack values for geekzoo-prod

defaultRules:
  create: true

alertmanager:
  enabled: true
  config:
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      # Phone notifications: don't re-page more than twice a day per group
      repeat_interval: 12h
      receiver: pushover-warning
      routes:
        # Watchdog fires always-on by design (dead-man's-switch) — never page
        - matchers:
            - alertname = "Watchdog"
          receiver: "null"
        # Info-severity is inhibitor plumbing, not actionable
        - matchers:
            - severity = "info"
          receiver: "null"
        - matchers:
            - severity = "critical"
          receiver: pushover-critical
    receivers:
      - name: "null"
      - name: pushover-warning
        pushover_configs:
          - token_file: /etc/alertmanager/secrets/pushover-credentials/token
            user_key_file: /etc/alertmanager/secrets/pushover-credentials/user_key
            priority: "0"
            title: '{{ .Status | toUpper }}{{ if eq .Status "firing" }} ({{ .Alerts.Firing | len }}){{ end }}: {{ .CommonLabels.alertname }}'
            message: |-
              {{ range .Alerts -}}
              {{ .Annotations.summary }}
              {{ .Annotations.description }}
              {{ end }}
      - name: pushover-critical
        pushover_configs:
          - token_file: /etc/alertmanager/secrets/pushover-credentials/token
            user_key_file: /etc/alertmanager/secrets/pushover-credentials/user_key
            # High priority: bypasses quiet hours, red highlight
            priority: "1"
            title: 'CRITICAL{{ if eq .Status "firing" }} ({{ .Alerts.Firing | len }}){{ end }}: {{ .CommonLabels.alertname }}'
            message: |-
              {{ range .Alerts -}}
              {{ .Annotations.summary }}
              {{ .Annotations.description }}
              {{ end }}
    inhibit_rules:
      # A firing critical mutes the matching warning for the same alert
      - source_matchers: [severity = "critical"]
        target_matchers: [severity = "warning"]
        equal: ["alertname", "namespace"]
      # InfoInhibitor standard plumbing from kube-prometheus-stack rules
      - source_matchers: [alertname = "InfoInhibitor"]
        target_matchers: [severity = "info"]
        equal: ["namespace"]
  alertmanagerSpec:
    # Mounted at /etc/alertmanager/secrets/pushover-credentials/
    secrets:
      - pushover-credentials
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: ceph-block
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

grafana:
  enabled: true
  # Recreate is required with a single RWO PVC: RollingUpdate surges a second
  # pod against the same sqlite DB, which deadlocks the rollout and crashes
  # startup provisioning with "database is locked" races.
  deploymentStrategy:
    type: Recreate
  ingress:
    enabled: false
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password
  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
      secretKeyRef:
        name: grafana-oidc-secret
        key: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-oidc-secret
        key: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
  persistence:
    enabled: true
    storageClassName: ceph-block
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      url: http://loki.observability.svc:3100
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 1000
    - name: Tempo
      type: tempo
      url: http://tempo.observability.svc:3200
      access: proxy
      isDefault: false
      jsonData:
        tracesToLogs:
          datasourceUid: loki
          filterByTraceID: true
          tags:
            - key: service.name
              value: k8s.pod.name
  grafana.ini:
    server:
      root_url: https://grafana.macbytes.io/
      serve_from_sub_path: false
    auth.generic_oauth:
      enabled: true
      name: Authentik
      allow_sign_up: true
      auto_login: false
      client_id: ${GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
      client_secret: ${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      scopes: openid profile email
      auth_url: https://authentik.macbytes.io/application/o/authorize/
      token_url: https://authentik.macbytes.io/application/o/token/
      api_url: https://authentik.macbytes.io/application/o/userinfo/
      login_attribute_path: preferred_username
      name_attribute_path: name
      email_attribute_path: email
      role_attribute_path: contains(groups, 'Grafana Admins') && 'Admin' || contains(groups, 'Grafana Editors') && 'Editor' || 'Viewer'
      sign_out_redirect_url: https://authentik.macbytes.io/application/o/grafana/end-session/
      tls_skip_verify_insecure: false
    news:
      enable_feed: false
    dashboards:
      default_home_dashboard_path: /tmp/dashboards/k8s-resources-cluster.json

kubeApiServer:
  enabled: true

kubelet:
  enabled: true

kubeControllerManager:
  enabled: false

# Cilium runs with kube-proxy-replacement — there is no kube-proxy to
# scrape, and the KubeProxyDown default rule false-pages without this.
kubeProxy:
  enabled: false

kubeEtcd:
  enabled: false

kubeScheduler:
  enabled: false

nodeExporter:
  enabled: true

prometheus-node-exporter:
  hostRootFsMount:
    enabled: true

prometheus:
  enabled: true
  prometheusSpec:
    retention: 15d
    # Accept remote_write from Tempo metrics-generator (service graphs / span metrics)
    enableRemoteWriteReceiver: true
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: ceph-block
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    # Running ~1.4Gi with Beyla network metrics; span-metrics from Tempo
    # generator adds more series — 2Gi limit left no headroom
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 3Gi
