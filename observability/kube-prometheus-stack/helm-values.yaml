# kube-prometheus-stack values for geekzoo-prod

defaultRules:
  create: true

# Replacements for the null-routed CephNodeNetworkPacketDrops (see
# alertmanager routes): alert on drop patterns that actually indicate
# trouble, not on the kernel's unwanted-frame accounting.
additionalPrometheusRulesMap:
  network-drops:
    groups:
      - name: network-drops
        rules:
          # Sustained heavy dropping — a real storm or misconfiguration, an
          # order of magnitude above observed LAN background noise (≤25 pps
          # bursts).
          - alert: NodeNetworkPacketDropsSustained
            expr: |
              sum by (instance, device) (
                  rate(node_network_receive_drop_total{device=~"ens.*|eth.*|bond.*"}[15m])
                + rate(node_network_transmit_drop_total{device=~"ens.*|eth.*|bond.*"}[15m])
              ) > 100
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Sustained packet drops on {{ $labels.instance }} {{ $labels.device }}"
              description: "{{ $value | humanize }} pkt/s dropped for 15m — beyond LAN background noise."
          # True NIC ring-buffer overrun — the counter that stays 0 during
          # cosmetic rx_dropped noise. Any nonzero rate here means the host
          # genuinely failed to keep up with the wire.
          - alert: NodeNetworkRingBufferOverflow
            expr: |
              rate(node_network_receive_fifo_total{device=~"ens.*|eth.*|bond.*"}[5m]) > 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "NIC ring buffer overruns on {{ $labels.instance }} {{ $labels.device }}"
              description: "receive_fifo increasing for 10m — host not draining the NIC; check IRQ/ring sizing."

alertmanager:
  enabled: true
  config:
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      # Phone notifications: don't re-page more than twice a day per group
      repeat_interval: 12h
      receiver: pushover-warning
      routes:
        # Watchdog fires always-on by design (dead-man's-switch) — never page
        - matchers:
            - alertname = "Watchdog"
          receiver: "null"
        # InfoInhibitor carries severity=none (not info), so it slips past
        # the info route below onto the default receiver. It must keep
        # FIRING to do its inhibit job — just never notify on it.
        - matchers:
            - alertname = "InfoInhibitor"
          receiver: "null"
        # Info-severity is inhibitor plumbing, not actionable
        - matchers:
            - severity = "info"
          receiver: "null"
        # Ceph-mixin rule fires instantly (for: 0) on rx_dropped, but that
        # counter includes frames the kernel discards as unwanted (other-VLAN
        # trunk traffic, L2 protocol frames, unjoined multicast). On our
        # near-idle 10G NICs (~1000 pps) LAN background noise trips the 0.5%
        # ratio a few times a night with zero rx errors / fifo overruns and
        # Ceph healthy. Replaced by NodeNetworkPacketDropsSustained +
        # NodeNetworkRingBufferOverflow (additionalPrometheusRulesMap).
        - matchers:
            - alertname = "CephNodeNetworkPacketDrops"
          receiver: "null"
        - matchers:
            - severity = "critical"
          receiver: pushover-critical
    receivers:
      - name: "null"
      - name: pushover-warning
        pushover_configs:
          - token_file: /etc/alertmanager/secrets/pushover-credentials/token
            user_key_file: /etc/alertmanager/secrets/pushover-credentials/user_key
            priority: "0"
            title: '{{ .Status | toUpper }}{{ if eq .Status "firing" }} ({{ .Alerts.Firing | len }}){{ end }}: {{ .CommonLabels.alertname }}'
            message: |-
              {{ range .Alerts -}}
              {{ .Annotations.summary }}
              {{ .Annotations.description }}
              {{ end }}
      - name: pushover-critical
        pushover_configs:
          - token_file: /etc/alertmanager/secrets/pushover-credentials/token
            user_key_file: /etc/alertmanager/secrets/pushover-credentials/user_key
            # High priority: bypasses quiet hours, red highlight
            priority: "1"
            title: 'CRITICAL{{ if eq .Status "firing" }} ({{ .Alerts.Firing | len }}){{ end }}: {{ .CommonLabels.alertname }}'
            message: |-
              {{ range .Alerts -}}
              {{ .Annotations.summary }}
              {{ .Annotations.description }}
              {{ end }}
    inhibit_rules:
      # A firing critical mutes the matching warning for the same alert
      - source_matchers: [severity = "critical"]
        target_matchers: [severity = "warning"]
        equal: ["alertname", "namespace"]
      # InfoInhibitor standard plumbing from kube-prometheus-stack rules
      - source_matchers: [alertname = "InfoInhibitor"]
        target_matchers: [severity = "info"]
        equal: ["namespace"]
  alertmanagerSpec:
    # Mounted at /etc/alertmanager/secrets/pushover-credentials/
    secrets:
      - pushover-credentials
    # Tiny workload: 7d max 22Mi / ~1m CPU
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: ceph-block
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

grafana:
  enabled: true
  # Recreate is required with a single RWO PVC: RollingUpdate surges a second
  # pod against the same sqlite DB, which deadlocks the rollout and crashes
  # startup provisioning with "database is locked" races.
  deploymentStrategy:
    type: Recreate
  ingress:
    enabled: false
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password
  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
      secretKeyRef:
        name: grafana-oidc-secret
        key: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-oidc-secret
        key: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
  persistence:
    enabled: true
    storageClassName: ceph-block
    size: 10Gi
  # Steady ~320Mi, provisioning-reload peaks ~950Mi — request tracks steady
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: 500m
      memory: 1Gi
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      url: http://loki.observability.svc:3100
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 1000
    - name: Tempo
      type: tempo
      url: http://tempo.observability.svc:3200
      access: proxy
      isDefault: false
      jsonData:
        tracesToLogs:
          datasourceUid: loki
          filterByTraceID: true
          tags:
            - key: service.name
              value: k8s.pod.name
  grafana.ini:
    server:
      root_url: https://grafana.macbytes.io/
      serve_from_sub_path: false
    auth.generic_oauth:
      enabled: true
      name: Authentik
      allow_sign_up: true
      auto_login: false
      client_id: ${GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
      client_secret: ${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      scopes: openid profile email
      auth_url: https://authentik.macbytes.io/application/o/authorize/
      token_url: https://authentik.macbytes.io/application/o/token/
      api_url: https://authentik.macbytes.io/application/o/userinfo/
      login_attribute_path: preferred_username
      name_attribute_path: name
      email_attribute_path: email
      role_attribute_path: contains(groups, 'Grafana Admins') && 'Admin' || contains(groups, 'Grafana Editors') && 'Editor' || 'Viewer'
      sign_out_redirect_url: https://authentik.macbytes.io/application/o/grafana/end-session/
      tls_skip_verify_insecure: false
    news:
      enable_feed: false
    dashboards:
      default_home_dashboard_path: /tmp/dashboards/k8s-resources-cluster.json

kubeApiServer:
  enabled: true

kubelet:
  enabled: true

kubeControllerManager:
  enabled: false

# Cilium runs with kube-proxy-replacement — there is no kube-proxy to
# scrape, and the KubeProxyDown default rule false-pages without this.
kubeProxy:
  enabled: false

kubeEtcd:
  enabled: false

kubeScheduler:
  enabled: false

nodeExporter:
  enabled: true

prometheus-node-exporter:
  hostRootFsMount:
    enabled: true

prometheus:
  enabled: true
  prometheusSpec:
    retention: 15d
    # Rook/other charts create ServiceMonitors + PrometheusRules without the release
    # label. An empty selector ({}) is falsy in Helm, so the chart's
    # *SelectorNilUsesHelmValues defaults still inject the release-label selector —
    # these flags are the only way to get a true match-everything selector.
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    # Accept remote_write from Tempo metrics-generator (service graphs / span metrics)
    enableRemoteWriteReceiver: true
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: ceph-block
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    # 7d max 2.5Gi working set, and the Cilium/Hubble/Envoy + Ceph monitors
    # added 2026-07-03 brought ~11k new series — 3Gi limit left no headroom
    resources:
      requests:
        # p95 sits right at 200m — 300m keeps it honestly scheduled
        cpu: 300m
        memory: 2Gi
      limits:
        cpu: "1"
        memory: 4Gi
