apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-operator
  namespace: monitoring
spec:
  interval: 30m
  releaseName: victoria-metrics-operator
  chart:
    spec:
      chart: victoria-metrics-operator
      version: "0.62.1"
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics
        namespace: monitoring
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    nameOverride: vmo
    admissionWebhooks:
      certManager:
        enabled: true
    operator:
      disable_prometheus_converter: false
