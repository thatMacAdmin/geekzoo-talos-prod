apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vector
  namespace: monitoring
spec:
  interval: 30m
  releaseName: vector
  chart:
    spec:
      chart: vector
      version: "0.52.0"
      sourceRef:
        kind: HelmRepository
        name: vector
        namespace: monitoring
  values:
    role: Agent
    service:
      enabled: false
    serviceHeadless:
      enabled: false
    customConfig:
      data_dir: /vector-data-dir/current
      api:
        enabled: true
        address: 0.0.0.0:8686
      sources:
        kubernetes_logs:
          type: kubernetes_logs
          self_node_name: ${VECTOR_SELF_NODE_NAME}
          read_from: end
          ignore_older_secs: 600
          insert_namespace_fields: false
          pod_annotation_fields:
            container_image_id: ""
            pod_annotations: ""
            pod_ips: ""
            pod_uid: ""
          node_annotation_fields:
            node_labels: ""
      transforms:
        normalize_kubernetes_logs:
          type: remap
          inputs:
            - kubernetes_logs
          source: |-
            .namespace = .kubernetes.pod_namespace
            .pod = .kubernetes.pod_name
            .container = .kubernetes.container_name
            .node = .kubernetes.pod_node_name
            .owner = .kubernetes.pod_owner
            .workload = .kubernetes.pod_owner

            if exists(.kubernetes.pod_labels."app.kubernetes.io/name") {
              .app = .kubernetes.pod_labels."app.kubernetes.io/name"
            } else if exists(.kubernetes.pod_labels.app) {
              .app = .kubernetes.pod_labels.app
            }
            del(.kubernetes.pod_labels)

            parsed = parse_json(.message) ?? {}
            if is_object(parsed) {
              if exists(parsed.level) {
                .level = downcase(to_string!(parsed.level))
              } else if exists(parsed.severity) {
                .level = downcase(to_string!(parsed.severity))
              } else if exists(parsed.log_level) {
                .level = downcase(to_string!(parsed.log_level))
              }
            }

            if !exists(.level) {
              message = downcase(to_string(.message) ?? "")
              if contains(message, "critical") || contains(message, "fatal") || contains(message, "panic") {
                .level = "critical"
              } else if contains(message, "error") || contains(message, "exception") || contains(message, "traceback") {
                .level = "error"
              } else if contains(message, "warning") || contains(message, "warn") {
                .level = "warning"
              } else if contains(message, "debug") {
                .level = "debug"
              } else if contains(message, "trace") {
                .level = "trace"
              } else {
                .level = "info"
              }
            }

            if .namespace == "rook-ceph" && .level == "debug" {
              .level = "info"
            }
      sinks:
        victoria_logs:
          type: http
          inputs:
            - normalize_kubernetes_logs
          uri: http://victoria-logs-vlogs-server.monitoring.svc.cluster.local:9428/insert/jsonline?_stream_fields=namespace,pod,container,node,app,workload,level&_msg_field=message&_time_field=timestamp
          compression: gzip
          encoding:
            codec: json
          framing:
            method: newline_delimited
          healthcheck:
            enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
