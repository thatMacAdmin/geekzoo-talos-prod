apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 30m
  releaseName: grafana
  chart:
    spec:
      chart: grafana
      version: "10.5.14"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
  values:
    replicas: 1
    service:
      type: ClusterIP
      port: 80
    persistence:
      enabled: false
    plugins:
      - victoriametrics-logs-datasource
    envFromSecret: grafana-oidc-config
    grafana.ini:
      analytics:
        check_for_updates: false
        check_for_plugin_updates: false
      auth:
        disable_login_form: false
        oauth_auto_login: false
      auth.anonymous:
        enabled: false
      auth.generic_oauth:
        enabled: true
        name: Authentik
        allow_sign_up: true
      server:
        domain: grafana.macbytes.io
        root_url: https://grafana.macbytes.io
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL
        folderAnnotation: grafana_folder
        provider:
          allowUiUpdates: false
          disableDelete: true
          foldersFromFilesStructure: false
      datasources:
        enabled: true
        label: grafana_datasource
        labelValue: "1"
        searchNamespace: ALL
    testFramework:
      enabled: false
