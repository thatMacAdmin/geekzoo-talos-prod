apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
  namespace: monitoring
spec:
  interval: 30m
  releaseName: victoria-logs
  chart:
    spec:
      chart: victoria-logs-single
      version: "0.12.4"
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics
        namespace: monitoring
  values:
    nameOverride: vlogs
    vector:
      enabled: false
    server:
      retentionPeriod: 14d
      persistentVolume:
        enabled: true
        storageClassName: ceph-block
        size: 100Gi
      service:
        type: ClusterIP
        servicePort: 9428
