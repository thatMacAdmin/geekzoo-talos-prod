apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-kubernetes-logs-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Kubernetes
data:
  kubernetes-logs.json: |
    {
      "uid": "kubernetes-logs-victorialogs",
      "title": "Kubernetes / Logs",
      "tags": ["kubernetes", "logs", "victorialogs", "vector"],
      "timezone": "browser",
      "schemaVersion": 41,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": {"type": "victoriametrics-logs-datasource", "uid": "PD775F2863313E6C7"},
            "query": {"type": "fieldValue", "field": "namespace", "query": "*", "limit": 1000},
            "refresh": 2,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": "*"
          },
          {
            "name": "workload",
            "label": "Workload",
            "type": "query",
            "datasource": {"type": "victoriametrics-logs-datasource", "uid": "PD775F2863313E6C7"},
            "query": {"type": "fieldValue", "field": "workload", "query": "namespace:$namespace", "limit": 1000},
            "refresh": 2,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": "*"
          },
          {
            "name": "pod",
            "label": "Pod",
            "type": "query",
            "datasource": {"type": "victoriametrics-logs-datasource", "uid": "PD775F2863313E6C7"},
            "query": {"type": "fieldValue", "field": "pod", "query": "namespace:$namespace workload:$workload", "limit": 1000},
            "refresh": 2,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": "*"
          },
          {
            "name": "container",
            "label": "Container",
            "type": "query",
            "datasource": {"type": "victoriametrics-logs-datasource", "uid": "PD775F2863313E6C7"},
            "query": {"type": "fieldValue", "field": "container", "query": "namespace:$namespace pod:$pod", "limit": 1000},
            "refresh": 2,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": "*"
          },
          {
            "name": "level",
            "label": "Level",
            "type": "custom",
            "query": "critical,error,warning,info,debug,trace",
            "multi": true,
            "includeAll": true,
            "allValue": "*"
          },
          {
            "name": "text",
            "label": "Text filter",
            "type": "textbox",
            "query": "*"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Log volume by level",
          "type": "timeseries",
          "datasource": {"type": "victoriametrics-logs-datasource", "uid": "PD775F2863313E6C7"},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 0},
          "targets": [
            {
              "refId": "A",
              "expr": "namespace:$namespace workload:$workload pod:$pod container:$container level:$level $text | stats by (level) count()",
              "queryType": "statsRange",
              "legendFormat": "{{level}}"
            }
          ],
          "fieldConfig": {
            "defaults": {"custom": {"drawStyle": "bars", "fillOpacity": 35, "showPoints": "never"}},
            "overrides": []
          },
          "options": {"legend": {"displayMode": "table", "placement": "right", "showLegend": true}, "tooltip": {"mode": "multi"}}
        },
        {
          "id": 2,
          "title": "Recent logs",
          "type": "logs",
          "datasource": {"type": "victoriametrics-logs-datasource", "uid": "PD775F2863313E6C7"},
          "gridPos": {"h": 16, "w": 24, "x": 0, "y": 8},
          "targets": [
            {
              "refId": "A",
              "expr": "namespace:$namespace workload:$workload pod:$pod container:$container level:$level $text",
              "queryType": "instant",
              "maxLines": 1000,
              "direction": "desc"
            }
          ],
          "options": {
            "showLabels": true,
            "showTime": true,
            "wrapLogMessage": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          }
        }
      ]
    }
