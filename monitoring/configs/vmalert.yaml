apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlert
metadata:
  name: alerts
  namespace: monitoring
spec:
  replicaCount: 1
  evaluationInterval: 30s
  datasource:
    url: http://vmsingle-metrics.monitoring.svc.cluster.local:8428
  notifier:
    url: http://vmalertmanager-alertmanager.monitoring.svc.cluster.local:9093
  remoteRead:
    url: http://vmsingle-metrics.monitoring.svc.cluster.local:8428
  remoteWrite:
    url: http://vmsingle-metrics.monitoring.svc.cluster.local:8428/api/v1/write
  ruleSelector: {}
  ruleNamespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: monitoring
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
