apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-victoria-datasources
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        access: proxy
        url: http://vmsingle-metrics.monitoring.svc.cluster.local:8428
        isDefault: true
        jsonData:
          httpMethod: POST
          timeInterval: 30s
      - name: Alertmanager
        type: alertmanager
        access: proxy
        url: http://vmalertmanager-alertmanager.monitoring.svc.cluster.local:9093
        jsonData:
          implementation: prometheus
          handleGrafanaManagedAlerts: false
      - name: VictoriaLogs
        type: victoriametrics-logs-datasource
        access: proxy
        url: http://victoria-logs-vlogs-server.monitoring.svc.cluster.local:9428
        jsonData:
          maxLines: 1000
          logLevelRules:
            - field: level
              value: critical
              level: critical
              operator: equals
              enabled: true
            - field: level
              value: error
              level: error
              operator: equals
              enabled: true
            - field: level
              value: warning
              level: warning
              operator: equals
              enabled: true
            - field: level
              value: warn
              level: warning
              operator: equals
              enabled: true
            - field: level
              value: info
              level: info
              operator: equals
              enabled: true
            - field: level
              value: debug
              level: debug
              operator: equals
              enabled: true
            - field: level
              value: trace
              level: trace
              operator: equals
              enabled: true
