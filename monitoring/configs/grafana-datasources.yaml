apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-victoria-datasources
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        access: proxy
        url: http://vmsingle-metrics.monitoring.svc.cluster.local:8428
        isDefault: true
        jsonData:
          httpMethod: POST
          timeInterval: 30s
      - name: VictoriaLogs
        type: victoriametrics-logs-datasource
        access: proxy
        url: http://victoria-logs-vlogs-server.monitoring.svc.cluster.local:9428
        jsonData:
          maxLines: 1000
