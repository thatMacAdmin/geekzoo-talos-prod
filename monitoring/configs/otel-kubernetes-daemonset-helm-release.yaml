apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-kubernetes-daemonset
  namespace: monitoring
spec:
  interval: 30m
  releaseName: otel-kubernetes-daemonset
  chart:
    spec:
      chart: opentelemetry-collector
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: monitoring
  valuesFrom:
    - kind: ConfigMap
      name: otel-kubernetes-daemonset-values
      valuesKey: values.yaml
