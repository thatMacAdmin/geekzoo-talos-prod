apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: observability-baseline
  namespace: monitoring
spec:
  groups:
    - name: observability-baseline
      interval: 30s
      rules:
        - alert: ObservabilityTargetDown
          expr: up == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Metrics target {{ $labels.job }} is down"
            description: "{{ $labels.instance }} has been unreachable for more than 5 minutes."
        - alert: VictoriaMetricsNoSamplesIngested
          expr: rate(vm_rows_inserted_total[5m]) == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: VictoriaMetrics is not ingesting samples
            description: VMSingle has not inserted samples for more than 10 minutes.
