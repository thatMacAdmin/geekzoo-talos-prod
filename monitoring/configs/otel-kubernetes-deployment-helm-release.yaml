apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-kubernetes-deployment
  namespace: monitoring
spec:
  interval: 30m
  releaseName: otel-kubernetes-deployment
  chart:
    spec:
      chart: opentelemetry-collector
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: monitoring
  valuesFrom:
    - kind: ConfigMap
      name: otel-kubernetes-deployment-values
      valuesKey: values.yaml
