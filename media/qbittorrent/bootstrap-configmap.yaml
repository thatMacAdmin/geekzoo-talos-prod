apiVersion: v1
kind: ConfigMap
metadata:
  name: qbittorrent-bootstrap
  namespace: media
data:
  qbittorrent-bootstrap.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    # qBittorrent bootstrap hook.
    # Keep startup idempotent and safe for future config templating.
    for _ in {1..30}; do
      if [[ -f /gluetun/forwarded_port ]]; then
        break
      fi
      echo "bootstrap: waiting for /gluetun/forwarded_port"
      sleep 2
    done

    if [[ -f /gluetun/forwarded_port ]]; then
      echo "bootstrap: current forwarded port: $(cat /gluetun/forwarded_port)"
    else
      echo "bootstrap: forwarded port file not available; starting qBittorrent anyway"
    fi

    exec /init
